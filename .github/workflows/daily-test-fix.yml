name: Daily Test And Auto Fix

run-name: >-
  ${{ github.event.inputs.rerun_count != '' && github.event.inputs.rerun_count != '0'
      && format('Rerun Post Merge {0} - Verify Copilot Fix', github.event.inputs.rerun_count)
      || 'Daily Test And Auto Fix' }}

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to test'
        required: false
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - prod
      rerun_count:
        description: 'Rerun attempt number'
        required: false
        default: '0'
      site:
        description: 'Which site(s) to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - saucedemo
          - herokuapp
          - magento
      initial_run_id:
        description: 'Initial (failing) run ID — used by post-merge rerun to build a comparison report'
        required: false
        default: ''
  pull_request:
    types: [closed]
    branches: [master]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  run-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      test_outcome: ${{ steps.test-outcome.outputs.test_outcome }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.env != '' && inputs.env || 'qa')) || fromJson('["qa"]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Tests
        id: run
        run: |
          # Resolve site → cucumber tag filter ("all" → no filter)
          SITE_INPUT="${{ github.event.inputs.site }}"
          if [ -n "$SITE_INPUT" ] && [ "$SITE_INPUT" != "all" ]; then
            TAG_ARG="-Dcucumber.filter.tags=@${SITE_INPUT}"
            echo "🏷️  Filtering scenarios with: $TAG_ARG"
          else
            TAG_ARG=""
            echo "🏷️  No site filter — running all sites"
          fi

          if [ "${{ github.event.inputs.rerun_count }}" != "0" ] && [ "${{ github.event.inputs.rerun_count }}" != "" ]; then
            # ── RERUN POST MERGE (triggered after Copilot fix is merged) ────────
            echo "========================================================"
            echo "🔄 RERUN POST MERGE ${{ github.event.inputs.rerun_count }}: Re-running full suite to verify the Copilot fix..."
            echo "========================================================"
            mvn clean verify -Denv=${{ matrix.env }} -Dheadless.mode=true $TAG_ARG
          else
            # ── INITIAL SCHEDULED / FIRST RUN ───────────────────────────────────
            echo "========================================================"
            echo "🚀 PASS 1: Running full test suite..."
            echo "========================================================"
            set +e
            mvn clean verify -Denv=${{ matrix.env }} -Dheadless.mode=true $TAG_ARG
            PASS1_EXIT=$?
            set -e

            PARSER=".github/scripts/parse_failsafe.py"

            # Diagnostic: list what's in target/ so we can confirm reports were generated
            echo "── Diagnostic: target/ contents ──"
            ls -la target/ 2>/dev/null || echo "target/ missing"
            echo ""
            echo "── Diagnostic: failsafe-reports/ contents ──"
            if [ -d "target/failsafe-reports" ]; then
              ls -la target/failsafe-reports/
              echo "Test XML files:"
              find target/failsafe-reports -name "*.xml" -exec wc -l {} \;
            else
              echo "target/failsafe-reports/ missing — ⚠️ NO TESTS RAN!"
            fi
            echo ""
            echo "── Diagnostic: serenity/ structure BEFORE copying ──"
            if [ -d "target/site/serenity" ]; then
              echo "✅ target/site/serenity exists"
              echo "Top-level contents:"
              ls -lah target/site/serenity/ | head -20
              echo ""
              echo "Directories:"
              find target/site/serenity -maxdepth 1 -type d
              echo ""
              echo "All files (with counts):"
              find target/site/serenity -type f | wc -l
              echo "  - CSS files:"
              find target/site/serenity -name "*.css" 2>/dev/null | wc -l
              echo "  - JS files:"
              find target/site/serenity -name "*.js" 2>/dev/null | wc -l
              echo "  - JSON files:"
              find target/site/serenity -name "*.json" 2>/dev/null | wc -l
              echo "  - HTML files:"
              find target/site/serenity -name "*.html" 2>/dev/null | wc -l
              echo ""
              echo "Critical files:"
              [ -f "target/site/serenity/index.html" ] && echo "  ✅ index.html" || echo "  ❌ index.html MISSING"
              [ -d "target/site/serenity/css" ] && echo "  ✅ css/" || echo "  ❌ css/ MISSING"
              [ -d "target/site/serenity/js" ] && echo "  ✅ js/" || echo "  ❌ js/ MISSING ⚠️"
              [ -f "target/site/serenity/data.json" ] && echo "  ✅ data.json" || echo "  ❌ data.json MISSING ⚠️"
            else
              echo "❌ target/site/serenity DOES NOT EXIST — ⚠️ SERENITY REPORT NOT GENERATED!"
              echo "This likely means Maven tests failed to run or Serenity plugin issue"
            fi

            FAILED_COUNT=$(python3 "$PARSER" count 2>/dev/null || echo 0)
            SKIPPED_COUNT=$(python3 "$PARSER" skipped-count 2>/dev/null || echo 0)
            RETRIABLE_COUNT=$(python3 "$PARSER" retriable-count 2>/dev/null || echo 0)
            echo ""
            echo "── Diagnostic Summary ──"
            echo "Maven exit code: $PASS1_EXIT (0 = success, non-zero = failure)"
            echo "Failed/error test count: $FAILED_COUNT"
            echo "Skipped test count: $SKIPPED_COUNT"
            echo "Retriable test issue count: $RETRIABLE_COUNT"

            # ── Snapshot PASS 1 reports BEFORE any PASS 2 `mvn clean` wipes them.
            # The email is sent from this snapshot so the user always sees the
            # original (PASS 1) result set, not just the rerun subset.
            mkdir -p pass1-reports
            if [ -d "target/site/serenity" ]; then
              cp -r target/site/serenity pass1-reports/serenity
              echo "📸 Snapshotted PASS 1 Serenity report → pass1-reports/serenity"
            fi
            if [ -d "target/failsafe-reports" ]; then
              cp -r target/failsafe-reports pass1-reports/failsafe-reports
              echo "📸 Snapshotted PASS 1 failsafe reports → pass1-reports/failsafe-reports"
            fi
            if [ -f "target/rerun.txt" ]; then
              cp target/rerun.txt pass1-reports/rerun.txt
            fi

            if [ "$PASS1_EXIT" -eq 0 ] && [ "$RETRIABLE_COUNT" -eq 0 ]; then
              echo "========================================================"
              echo "✅ PASS 1: All tests passed! Nothing to rerun."
              echo "========================================================"
            else
              echo "========================================================"
              echo "❌ PASS 1: Test issues detected (exit=$PASS1_EXIT, failed/error=$FAILED_COUNT, skipped=$SKIPPED_COUNT)."
              echo "========================================================"

              # Cucumber's rerun plugin writes failed scenario URIs to target/rerun.txt,
              # one per line, e.g.:
              #   src/test/resources/features/saucedemo/login.feature:7
              if [ "$SKIPPED_COUNT" -gt 0 ]; then
                echo "🔄 PASS 2: Skipped scenarios detected. Re-running the full suite once so skipped cases are retried as well..."
                set +e
                mvn verify -Denv=${{ matrix.env }} -Dheadless.mode=true $TAG_ARG
                PASS2_EXIT=$?
                set -e

                PASS2_FAILED=$(python3 "$PARSER" count 2>/dev/null || echo 0)
                PASS2_SKIPPED=$(python3 "$PARSER" skipped-count 2>/dev/null || echo 0)
                PASS2_RETRIABLE=$(python3 "$PARSER" retriable-count 2>/dev/null || echo 0)
                echo "── Diagnostic: PASS2_EXIT=$PASS2_EXIT PASS2_FAILED=$PASS2_FAILED PASS2_SKIPPED=$PASS2_SKIPPED PASS2_RETRIABLE=$PASS2_RETRIABLE ──"

                if [ "$PASS2_EXIT" -eq 0 ] && [ "$PASS2_RETRIABLE" -eq 0 ]; then
                  echo "========================================================"
                  echo "✅ PASS 2: Previously failed/skipped scenarios now pass. No issue raised."
                  echo "========================================================"
                else
                  echo "========================================================"
                  echo "❌ PASS 2: Failures or skipped scenarios persist after rerun. Raising GitHub issue for investigation..."
                  echo "========================================================"
                  exit 1
                fi
              elif [ -s "target/rerun.txt" ]; then
                echo "── Failed scenarios (target/rerun.txt) ──"
                cat target/rerun.txt
                echo "─────────────────────────────────────────"

                # Stash the rerun file because `mvn clean` would delete it,
                # then convert lines to a comma-separated value for cucumber.features.
                # Strip any leading `file:` prefix that older Cucumber versions emit,
                # and prepend `./` so paths are unambiguously resolved relative to CWD
                # (otherwise Cucumber discovery can silently produce 0 tests).
                cp target/rerun.txt rerun.txt
                FAILED_FEATURES=$(sed 's|^file:||; s|^|./|' rerun.txt | paste -sd,)
                echo "🔄 PASS 2: cucumber.features=$FAILED_FEATURES"

                set +e
                mvn clean verify -Denv=${{ matrix.env }} -Dheadless.mode=true \
                  -Dcucumber.features="$FAILED_FEATURES"
                PASS2_EXIT=$?
                set -e
                rm -f rerun.txt

                PASS2_FAILED=$(python3 "$PARSER" count 2>/dev/null || echo 0)
                PASS2_SKIPPED=$(python3 "$PARSER" skipped-count 2>/dev/null || echo 0)
                PASS2_RETRIABLE=$(python3 "$PARSER" retriable-count 2>/dev/null || echo 0)
                echo "── Diagnostic: PASS2_EXIT=$PASS2_EXIT PASS2_FAILED=$PASS2_FAILED PASS2_SKIPPED=$PASS2_SKIPPED PASS2_RETRIABLE=$PASS2_RETRIABLE ──"

                if [ "$PASS2_EXIT" -eq 0 ] && [ "$PASS2_RETRIABLE" -eq 0 ]; then
                  echo "========================================================"
                  echo "✅ PASS 2: Previously failed scenarios now pass. No issue raised."
                  echo "========================================================"
                else
                  echo "========================================================"
                  echo "❌ PASS 2: Failures or skipped scenarios persist on rerun. Raising GitHub issue for investigation..."
                  echo "========================================================"
                  exit 1
                fi
              else
                echo "========================================================"
                echo "⚠️  PASS 1: Failed but target/rerun.txt is missing/empty."
                echo "🔄 PASS 2 (fallback): Re-running full suite once before raising issue..."
                echo "========================================================"
                set +e
                mvn verify -Denv=${{ matrix.env }} -Dheadless.mode=true $TAG_ARG
                PASS2_EXIT=$?
                set -e
                PASS2_FAILED=$(python3 "$PARSER" count 2>/dev/null || echo 0)
                PASS2_SKIPPED=$(python3 "$PARSER" skipped-count 2>/dev/null || echo 0)
                PASS2_RETRIABLE=$(python3 "$PARSER" retriable-count 2>/dev/null || echo 0)
                echo "── Diagnostic: PASS2_EXIT=$PASS2_EXIT PASS2_FAILED=$PASS2_FAILED PASS2_SKIPPED=$PASS2_SKIPPED PASS2_RETRIABLE=$PASS2_RETRIABLE ──"
                if [ "$PASS2_EXIT" -eq 0 ] && [ "$PASS2_RETRIABLE" -eq 0 ]; then
                  echo "✅ PASS 2 (fallback): All tests now pass! Likely flaky."
                else
                  echo "❌ PASS 2 (fallback): Failures or skipped scenarios still present. Raising GitHub issue..."
                  exit 1
                fi
              fi
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

      - name: Save test outcome
        if: always()
        id: test-outcome
        run: |
          echo "test_outcome=${{ steps.run.outcome }}" >> $GITHUB_OUTPUT
          echo "Test outcome: ${{ steps.run.outcome }}" > test-outcome.txt

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.env }}
          path: |
            test-outcome.txt
            pass1-reports/
            target/failsafe-reports/
            target/site/serenity/
            target/rerun.txt
          if-no-files-found: warn

      - name: Locate & Package Serenity Report
        if: always()
        id: report
        run: |
          echo "========================================================"
          echo "📊 Serenity Report Diagnostics"
          echo "========================================================"
          
          echo ""
          echo "── PASS 1 Report (pass1-reports/serenity) ──"
          if [ -d "pass1-reports/serenity" ]; then
            echo "✅ Directory exists"
            PASS1_FILES=$(find pass1-reports/serenity -type f | wc -l)
            echo "   Files: $PASS1_FILES"
            ls -lah pass1-reports/serenity/ | head -15
            echo "   Key files:"
            [ -f "pass1-reports/serenity/index.html" ] && echo "   ✅ index.html" || echo "   ❌ index.html MISSING"
            [ -d "pass1-reports/serenity/css" ] && echo "   ✅ css/" || echo "   ❌ css/ MISSING"
            [ -d "pass1-reports/serenity/js" ] && echo "   ✅ js/" || echo "   ❌ js/ MISSING"
            [ -f "pass1-reports/serenity/data.json" ] && echo "   ✅ data.json (TEST DATA)" || echo "   ❌ data.json MISSING (⚠️  CRITICAL!)"
            [ -f "pass1-reports/serenity/data.js" ] && echo "   ✅ data.js (TEST DATA)" || echo "   ❌ data.js MISSING"
            [ -d "pass1-reports/serenity/screenshots" ] && echo "   ✅ screenshots/" || echo "   ⚠️  screenshots/ missing"
            [ -d "pass1-reports/serenity/json" ] && echo "   ✅ json/" || echo "   ⚠️  json/ missing"
            echo "   All JSON/JS files:"
            find pass1-reports/serenity -name "*.json" -o -name "*.js" 2>/dev/null | head -20
          else
            echo "❌ Directory missing"
          fi
          
          echo ""
          echo "── Current Report (target/site/serenity) ──"
          if [ -d "target/site/serenity" ]; then
            echo "✅ Directory exists"
            CURRENT_FILES=$(find target/site/serenity -type f | wc -l)
            echo "   Files: $CURRENT_FILES"
            ls -lah target/site/serenity/ | head -15
            echo "   Key files:"
            [ -f "target/site/serenity/index.html" ] && echo "   ✅ index.html" || echo "   ❌ index.html MISSING"
            [ -d "target/site/serenity/css" ] && echo "   ✅ css/" || echo "   ❌ css/ MISSING"
            [ -d "target/site/serenity/js" ] && echo "   ✅ js/" || echo "   ❌ js/ MISSING"
            [ -f "target/site/serenity/data.json" ] && echo "   ✅ data.json (TEST DATA)" || echo "   ❌ data.json MISSING (⚠️  CRITICAL!)"
            [ -f "target/site/serenity/data.js" ] && echo "   ✅ data.js (TEST DATA)" || echo "   ❌ data.js MISSING"
            [ -d "target/site/serenity/screenshots" ] && echo "   ✅ screenshots/" || echo "   ⚠️  screenshots/ missing"
            [ -d "target/site/serenity/json" ] && echo "   ✅ json/" || echo "   ⚠️  json/ missing"
            echo "   All JSON/JS files:"
            find target/site/serenity -name "*.json" -o -name "*.js" 2>/dev/null | head -20
          else
            echo "❌ Directory missing"
          fi

          # Prefer the PASS 1 snapshot so the email always reflects the original
          # (full) test run, not the rerun subset from PASS 2.
          REPORT_DIR=""
          if [ -d "pass1-reports/serenity" ] && [ -f "pass1-reports/serenity/index.html" ]; then
            REPORT_DIR="pass1-reports/serenity"
            echo ""
            echo "✅ Selected: PASS 1 snapshot"
          elif [ -d "target/site/serenity" ] && [ -f "target/site/serenity/index.html" ]; then
            REPORT_DIR="target/site/serenity"
            echo ""
            echo "⚠️  Selected: Current build (PASS 1 not available)"
          else
            echo ""
            echo "❌ FATAL: No Serenity report directory with index.html found"
            echo "   - Check that tests actually ran"
            echo "   - Check Maven output for Serenity report generation"
            echo "report_zip=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count test files to verify report has content
          FILE_COUNT=$(find "$REPORT_DIR" -type f 2>/dev/null | wc -l)
          DIR_COUNT=$(find "$REPORT_DIR" -type d 2>/dev/null | wc -l)
          
          echo ""
          echo "Selected report structure:"
          echo "   - Total directories: $DIR_COUNT"
          echo "   - Total files: $FILE_COUNT"
          
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "   ⚠️  WARNING: Very few files ($FILE_COUNT) — report may be incomplete!"
          fi

          # Build ZIP
          ZIP_PATH="serenity-full-report-${{ matrix.env }}.zip"
          echo ""
          echo "Creating ZIP: $ZIP_PATH"
          
          if [ "$FILE_COUNT" -gt 0 ]; then
            echo "   Compressing $FILE_COUNT files..."
            (cd "$(dirname $REPORT_DIR)" && zip -qr "$OLDPWD/$ZIP_PATH" "$(basename $REPORT_DIR)")
            ZIP_SIZE=$(du -h "$ZIP_PATH" | cut -f1)
            ZIP_BYTES=$(stat -c%s "$ZIP_PATH" 2>/dev/null || wc -c <"$ZIP_PATH")
            ZIP_CONTENTS=$(unzip -l "$ZIP_PATH" 2>/dev/null | tail -1 | awk '{print $2}')
            echo "report_zip=$ZIP_PATH" >> $GITHUB_OUTPUT
            echo "report_zip_bytes=$ZIP_BYTES" >> $GITHUB_OUTPUT
            echo "report_zip_size=$ZIP_SIZE" >> $GITHUB_OUTPUT

            # Gmail attachment limit is 25 MB. Use 24 MB (25165824 bytes) to leave
            # headroom for MIME base64 encoding overhead (~33%). If the zip exceeds
            # this, skip the email attachment and rely on the workflow artifact link.
            EMAIL_LIMIT_BYTES=25165824
            if [ "$ZIP_BYTES" -le "$EMAIL_LIMIT_BYTES" ]; then
              echo "email_attachment=$ZIP_PATH" >> $GITHUB_OUTPUT
              echo "report_too_large=false" >> $GITHUB_OUTPUT
              ATTACH_NOTE="✅ ZIP within Gmail attachment limit — will attach to email"
            else
              echo "email_attachment=" >> $GITHUB_OUTPUT
              echo "report_too_large=true" >> $GITHUB_OUTPUT
              ATTACH_NOTE="⚠️  ZIP exceeds Gmail 25 MB attachment limit — will link to workflow artifact instead"
            fi

            echo ""
            echo "✅ ZIP created:"
            echo "   - Size: $ZIP_SIZE ($ZIP_BYTES bytes)"
            echo "   - Files in ZIP: $ZIP_CONTENTS"
            echo "   - $ATTACH_NOTE"
            ls -lh "$ZIP_PATH"
          else
            echo "   ❌ Cannot create ZIP: report directory is empty!"
            echo "report_zip=" >> $GITHUB_OUTPUT
            echo "email_attachment=" >> $GITHUB_OUTPUT
            echo "report_too_large=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Serenity Report ZIP as artifact
        if: always() && steps.report.outputs.report_zip != ''
        uses: actions/upload-artifact@v4
        with:
          name: serenity-full-report-${{ matrix.env }}
          path: ${{ steps.report.outputs.report_zip }}
          if-no-files-found: warn
          retention-days: 30

      - name: Resolve Initial Run ID (post-merge fallback)
        if: always() && github.event.inputs.rerun_count == '2' && github.event.inputs.initial_run_id == ''
        id: resolve_initial
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          ENV_NAME: ${{ github.event.inputs.env || 'qa' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "🔍 initial_run_id not supplied for rerun_count=2 — searching linked issues for PASS1_RUN_ID..."
          # Fetch the full body of the first matching issue (no head -1 truncation)
          # Use jq --arg to safely inject the env variable
          BODY=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state all \
            --limit 30 \
            --json body \
            --jq --arg env "$ENV_NAME" \
            '[.[] | select(.body != null) | select(.body | (contains("PASS1_RUN_ID") and contains("PASS1_CONFIG env=\($env)"))) | .body][0] // ""' \
            2>/dev/null || true)
          if [ -z "$BODY" ]; then
            echo "⚠️ No issue found with PASS1_RUN_ID for env=${ENV_NAME}. Comparison will be skipped."
            echo "resolved_id=" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(printf '%s' "$BODY" | grep -oP '<!--\s*PASS1_RUN_ID\s+id=\K\d+' | head -1 || true)
            if [ -n "$RUN_ID" ]; then
              echo "✅ Resolved PASS 1 run id from issue: $RUN_ID"
              echo "resolved_id=$RUN_ID" >> $GITHUB_OUTPUT
            else
              echo "⚠️ PASS1_RUN_ID marker not found in issue body. Comparison will be skipped."
              echo "resolved_id=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Download Initial Run Artifact (for post-merge comparison)
        if: >-
          always() && (
            github.event.inputs.initial_run_id != '' ||
            steps.resolve_initial.outputs.resolved_id != ''
          )
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          INITIAL_RUN_ID: ${{ github.event.inputs.initial_run_id || steps.resolve_initial.outputs.resolved_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p initial-reports
          echo "📥 Downloading test-reports-${{ matrix.env }} from initial run $INITIAL_RUN_ID..."
          if gh run download "$INITIAL_RUN_ID" \
              --repo "${{ github.repository }}" \
              --name "test-reports-${{ matrix.env }}" \
              --dir initial-reports; then
            echo "✅ Initial run artifact downloaded to initial-reports/"
            find initial-reports -maxdepth 3 -type d | head -20
          else
            echo "⚠️ Could not download initial run artifact (id=$INITIAL_RUN_ID). Comparison report will be skipped."
            rm -rf initial-reports
          fi

      - name: Build Email Summary HTML
        if: always()
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          # Prefer PASS 1 failsafe snapshot so the email reflects the original run.
          if [ -d "pass1-reports/failsafe-reports" ]; then
            FAILSAFE_DIR="pass1-reports/failsafe-reports"
          else
            FAILSAFE_DIR="target/failsafe-reports"
          fi
          OUT="serenity-summary-${{ matrix.env }}.html"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          ATTACHMENTS=""
          if [ -d "$FAILSAFE_DIR" ]; then
            python3 .github/scripts/build_email_summary.py \
              "$FAILSAFE_DIR" "$OUT" "$RUN_URL" "${{ matrix.env }}"
            echo "summary_html=$OUT" >> $GITHUB_OUTPUT
            ls -lh "$OUT"
            ATTACHMENTS="$OUT"
          else
            echo "⚠️  No failsafe reports found at $FAILSAFE_DIR — skipping summary HTML."
            echo "summary_html=" >> $GITHUB_OUTPUT
          fi

          # Also build a self-contained copy of Serenity's index.html with
          # every CSS, JS, font, and image inlined as data URIs. The result
          # renders the full Serenity dashboard (charts, totals, capabilities
          # tables) standalone. Drilldown into feature pages still won't work
          # — that needs the full ZIP artifact.
          if [ -d "pass1-reports/serenity" ] && [ -f "pass1-reports/serenity/index.html" ]; then
            SERENITY_DIR="pass1-reports/serenity"
          elif [ -d "target/site/serenity" ] && [ -f "target/site/serenity/index.html" ]; then
            SERENITY_DIR="target/site/serenity"
          else
            SERENITY_DIR=""
          fi
          if [ -n "$SERENITY_DIR" ]; then
            SERENITY_OUT="serenity-index-${{ matrix.env }}.html"
            python3 .github/scripts/inline_serenity_index.py "$SERENITY_DIR" "$SERENITY_OUT"
            echo "serenity_index_html=$SERENITY_OUT" >> $GITHUB_OUTPUT
            ls -lh "$SERENITY_OUT"
            if [ -n "$ATTACHMENTS" ]; then
              ATTACHMENTS="$ATTACHMENTS,$SERENITY_OUT"
            else
              ATTACHMENTS="$SERENITY_OUT"
            fi
          else
            echo "serenity_index_html=" >> $GITHUB_OUTPUT
          fi

          echo "attachments=$ATTACHMENTS" >> $GITHUB_OUTPUT
          echo "Final email attachments: $ATTACHMENTS"

      - name: Build Initial-vs-Current Comparison Report
        if: >-
          always() && (
            github.event.inputs.initial_run_id != '' ||
            steps.resolve_initial.outputs.resolved_id != ''
          )
        id: comparison
        shell: bash
        run: |
          set -euo pipefail
          # Find the initial run's failsafe-reports directory inside the
          # downloaded artifact. The PASS 1 snapshot is preferred; fall back
          # to target/failsafe-reports if that snapshot is absent.
          INITIAL_FAILSAFE=""
          if [ -d "initial-reports" ]; then
            for candidate in \
              "initial-reports/pass1-reports/failsafe-reports" \
              "initial-reports/target/failsafe-reports"; do
              if [ -d "$candidate" ] && ls "$candidate"/TEST-*.xml >/dev/null 2>&1; then
                INITIAL_FAILSAFE="$candidate"; break
              fi
            done
          fi

          # Current run's failsafe (post-merge full re-run output)
          if [ -d "target/failsafe-reports" ]; then
            CURRENT_FAILSAFE="target/failsafe-reports"
          elif [ -d "pass1-reports/failsafe-reports" ]; then
            CURRENT_FAILSAFE="pass1-reports/failsafe-reports"
          else
            CURRENT_FAILSAFE=""
          fi

          if [ -z "$INITIAL_FAILSAFE" ] || [ -z "$CURRENT_FAILSAFE" ]; then
            echo "⚠️ Skipping comparison report — initial=$INITIAL_FAILSAFE current=$CURRENT_FAILSAFE"
            echo "comparison_html=" >> $GITHUB_OUTPUT
            exit 0
          fi

          OUT="comparison-initial-vs-postmerge-${{ matrix.env }}.html"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 .github/scripts/build_comparison_report.py \
            "$INITIAL_FAILSAFE" "$CURRENT_FAILSAFE" "$OUT" "$RUN_URL" "${{ matrix.env }}"
          ls -lh "$OUT"
          echo "comparison_html=$OUT" >> $GITHUB_OUTPUT

          # Append to email attachment list (read existing value back from output file)
          PREV="${{ steps.summary.outputs.attachments }}"
          if [ -n "$PREV" ]; then
            COMBINED="$PREV,$OUT"
          else
            COMBINED="$OUT"
          fi
          echo "attachments_combined=$COMBINED" >> $GITHUB_OUTPUT
          echo "Email attachments (with comparison): $COMBINED"

      - name: Prepare Email Content
        if: always()
        id: email-content
        env:
          MATRIX_ENV: ${{ matrix.env }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          RUN_OUTCOME: ${{ steps.run.outcome }}
          REPORT_ZIP: ${{ steps.report.outputs.report_zip }}
          REPORT_ZIP_SIZE: ${{ steps.report.outputs.report_zip_size }}
          REPORT_TOO_LARGE: ${{ steps.report.outputs.report_too_large }}
          COMPARISON_HTML: ${{ steps.comparison.outputs.comparison_html }}
          RERUN_COUNT: ${{ github.event.inputs.rerun_count }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${REPORT_ZIP}" ]; then
            case "${RUN_OUTCOME}" in
              failure) EMAIL_STATUS="FAILURES DETECTED ❌" ;;
              success) EMAIL_STATUS="ALL PASSED ✅" ;;
              skipped) EMAIL_STATUS="SKIPPED ⏭️" ;;
              *)       EMAIL_STATUS="ERROR ⚠️" ;;
            esac

            ARTIFACTS_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}#artifacts"

            COMPARISON_SECTION=""
            if [ -n "${COMPARISON_HTML:-}" ]; then
              COMPARISON_SECTION=$(printf '%s\n' \
                "" \
                "🔍 Initial vs Post-Merge comparison attached (open ${COMPARISON_HTML})" \
                "───────────────────────────────────────────────────────────────────" \
                "Shows fixed / still-failing / newly-failing scenarios between the" \
                "initial failing run and this post-PR-merge full-suite re-run.")
            fi

            REPORT_SECTION=$(printf '%s\n' \
              "📊 Summary attached (open serenity-summary-${MATRIX_ENV}.html)" \
              "──────────────────────────────────────────────────────────────" \
              "The attached HTML shows the pass/fail/skipped totals, a per-class" \
              "breakdown chart, and the failure messages for this run." \
              "Open it in any browser." \
              "" \
              "🧾 Serenity index attached (open serenity-index-${MATRIX_ENV}.html)" \
              "──────────────────────────────────────────────────────────────────" \
              "Serenity's own front page is also attached. The top-level totals" \
              "render standalone, but clicking through to feature or scenario" \
              "detail pages will NOT work without the rest of the report folder —" \
              "use the full ZIP artifact below for drilldown." \
              "" \
              "📦 Full Serenity report (with screenshots & step drilldown)" \
              "─────────────────────────────────────────────────────────────────" \
              "Published as a workflow artifact (${REPORT_ZIP_SIZE}):" \
              "   ${ARTIFACTS_URL}" \
              "" \
              "   Sign in to GitHub, scroll to the \"Artifacts\" section at the" \
              "   bottom of the run page, and download \"serenity-full-report-${MATRIX_ENV}\"." \
              "   Extract the ZIP first, then double-click index.html.")

            if [ -n "${COMPARISON_SECTION}" ]; then
              REPORT_SECTION=$(printf '%s\n%s' "${REPORT_SECTION}" "${COMPARISON_SECTION}")
            fi

            RUN_LABEL="Daily run"
            if [ -n "${RERUN_COUNT:-}" ] && [ "${RERUN_COUNT}" != "0" ] && [ "${RERUN_COUNT}" != "1" ]; then
              RUN_LABEL="Post-PR-merge full re-run (rerun ${RERUN_COUNT})"
            fi

            EMAIL_SUBJECT="Test Report [${MATRIX_ENV}] — ${EMAIL_STATUS} — ${RUN_LABEL} — ${REPO}"

            EMAIL_BODY=$(printf '%s\n' \
              "Hi," \
              "" \
              "The daily test run has completed." \
              "" \
              "📊 Test Summary" \
              "───────────────" \
              "Environment: ${MATRIX_ENV}" \
              "Status: ${RUN_OUTCOME}" \
              "Repository: ${REPO}" \
              "Run: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}" \
              "" \
              "${REPORT_SECTION}" \
              "" \
              "— Self-Healing Test Framework")
          else
            EMAIL_SUBJECT="Test Report [${MATRIX_ENV}] — ⚠️ NO REPORT GENERATED — ${REPO}"
            EMAIL_BODY=$(printf '%s\n' \
              "Hi," \
              "" \
              "The daily test run has completed." \
              "" \
              "📊 Test Summary" \
              "───────────────" \
              "Environment: ${MATRIX_ENV}" \
              "Status: ${RUN_OUTCOME}" \
              "Repository: ${REPO}" \
              "Run: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}" \
              "" \
              "⚠️ No Serenity report was generated for this run." \
              "" \
              "This could indicate:" \
              "  • Maven build failed before generating reports" \
              "  • No tests were executed" \
              "  • Report directory is missing" \
              "" \
              "Check the GitHub Actions log for details." \
              "" \
              "— Self-Healing Test Framework")
          fi

          # Emit subject as a single-line output and body as a multi-line output
          # using a random delimiter (required by GitHub Actions for multi-line values).
          DELIM="EMAIL_BODY_EOF_$(date +%s%N)"
          {
            printf 'email_subject=%s\n' "${EMAIL_SUBJECT}"
            printf 'email_body<<%s\n%s\n%s\n' "${DELIM}" "${EMAIL_BODY}" "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Email Test Result
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.email-content.outputs.email_subject }}
          to: harinder.qa.88@gmail.com
          from: Self-Healing Framework <${{ secrets.GMAIL_USERNAME }}>
          body: ${{ steps.email-content.outputs.email_body }}
          attachments: ${{ steps.comparison.outputs.attachments_combined != '' && steps.comparison.outputs.attachments_combined || steps.summary.outputs.attachments }}

  report-success:
    needs: run-tests
    if: needs.run-tests.outputs.test_outcome == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: All Tests Passed
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        with:
          github-token: ${{ github.token }}
          script: |
            const rerunCount = '${{ github.event.inputs.rerun_count }}' || '0';
            const isRerun = rerunCount !== '0' && rerunCount !== '';

            if (isRerun) {
              console.log(`✅ All tests passed on Rerun Post Merge ${rerunCount}! No further reruns required.`);
              console.log('The Copilot fix has been verified successfully.');

              // Close the auto-test-failure issue if open
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'auto-test-failure',
                state: 'open'
              });

              for (const issue of issues) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ **All tests passed on Rerun Post Merge ${rerunCount}.** The fix has been verified. Closing this issue.`
                });
                console.log(`Closed issue #${issue.number} - fix verified.`);
              }

              // Transition linked JIRA defects to Done
              const jiraBase = process.env.JIRA_BASE_URL;
              const jiraEmail = process.env.JIRA_EMAIL;
              const jiraToken = process.env.JIRA_API_TOKEN;
              const jiraProject = process.env.JIRA_PROJECT_KEY;

              if (jiraBase && jiraEmail && jiraToken && jiraProject) {
                const auth = Buffer.from(`${jiraEmail}:${jiraToken}`).toString('base64');

                for (const issue of issues) {
                  const jql = `project = "${jiraProject}" AND summary ~ "Auto Test Failure - GitHub #${issue.number}" AND status != Done AND status != Closed`;
                  const searchResp = await fetch(`${jiraBase}/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=1`, {
                    headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
                  });
                  const searchData = await searchResp.json();

                  if (searchData.total > 0) {
                    const jiraKey = searchData.issues[0].key;
                    const jiraId = searchData.issues[0].id;

                    // Get available transitions
                    const transResp = await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/transitions`, {
                      headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
                    });
                    const transData = await transResp.json();
                    const doneTrans = transData.transitions?.find(t =>
                      t.name.toLowerCase().includes('done') || t.name.toLowerCase().includes('close') || t.name.toLowerCase().includes('resolve')
                    );

                    if (doneTrans) {
                      await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/transitions`, {
                        method: 'POST',
                        headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transition: { id: doneTrans.id } })
                      });
                      console.log(`JIRA ${jiraKey} transitioned to "${doneTrans.name}".`);

                      // Add resolution comment
                      await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/comment`, {
                        method: 'POST',
                        headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                          body: {
                            type: "doc", version: 1,
                            content: [{ type: "paragraph", content: [{ type: "text",
                              text: `✅ All tests passed on Rerun Post Merge ${rerunCount}. Fix verified automatically by the self-healing framework.`
                            }] }]
                          }
                        })
                      });
                    } else {
                      console.log(`No Done/Close transition found for ${jiraKey}. Available: ${transData.transitions?.map(t => t.name).join(', ')}`);
                    }
                  }
                }
              }
            } else {
              console.log('✅ All tests passed! No issues to report. No rerun required.');
            }

  open-issue-and-assign-copilot:
    needs: run-tests
    if: always() && needs.run-tests.outputs.test_outcome == 'failure'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: artifacts
          merge-multiple: true

      - name: Create Or Update Issue
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              let out = [];
              for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, e.name);
                out = e.isDirectory() ? out.concat(walk(p)) : out.concat(p);
              }
              return out;
            }

            const rerunCount = `${{ github.event.inputs.rerun_count || '' }}`;
            const isPostMerge = rerunCount !== '' && rerunCount !== '0' && rerunCount !== '1';

            let body = `## Automated Test Failure\n\n`;
            body += `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;
            body += `**Environment:** ${{ github.event.inputs.env || 'qa' }}\n`;
            body += `**Site filter:** ${{ github.event.inputs.site || 'all' }}\n\n`;
            body += `<!-- PASS1_CONFIG env=${{ github.event.inputs.env || 'qa' }} site=${{ github.event.inputs.site || 'all' }} -->\n`;
            body += `<!-- PASS1_RUN_ID id=${context.runId} -->\n\n`;
            if (isPostMerge) {
              body += `> ⚠️ **These are post-PR-merge full-suite failures** — the Copilot fix was merged into master and the full test suite (respecting the original site filter) was re-run. The scenarios below STILL fail after that fix, so manual investigation is required.\n\n`;
            } else {
              body += `> ⚠️ **These are PASS 2 (post-rerun) failures only** — scenarios that failed in the initial run AND still failed after the automatic selective rerun. Flaky scenarios that passed on rerun are excluded.\n\n`;
            }
            body += `Analyze the failures below, identify the root cause, fix the source code, and open a PR.\n\n`;

            const allFiles = walk('artifacts');
            console.log(`Total artifact files found: ${allFiles.length}`);
            console.log(`All XML files in artifacts: ${allFiles.filter(f => /TEST-.*\.xml$/.test(f)).join('\n  ')}`);

            // ── 1. Failed scenario locations from Cucumber rerun.txt ─────────
            // Prefer PASS 2's rerun.txt (target/rerun.txt) over the PASS 1 snapshot.
            // Both list the same failed scenarios, but PASS 2 is the authoritative source.
            const rerunFile =
              allFiles.find(f => f.includes('target') && f.endsWith('rerun.txt')) ||
              allFiles.find(f => !f.includes('pass1-reports') && f.endsWith('rerun.txt')) ||
              allFiles.find(f => f.endsWith('rerun.txt'));
            const failedLocations = rerunFile
              ? [...new Set(
                  fs.readFileSync(rerunFile, 'utf8')
                    .split(/\r?\n/).map(s => s.replace(/^file:/, '').trim()).filter(Boolean)
                )]
              : [];
            console.log(`Using rerun.txt: ${rerunFile || 'none'} (${failedLocations.length} unique entries)`);

            // ── 2. Parse failsafe XML for scenario name + failure message ────
            // Prefer PASS 2 results (failures that PERSISTED after the rerun).
            // If none (PASS 2 may not have produced XML, e.g. `mvn clean` wiped
            // it or the rerun was skipped), fall back to PASS 1 so the issue
            // always carries failure details.
            const pass2Xmls = allFiles.filter(f =>
              f.includes('failsafe-reports') &&
              !f.includes('pass1-reports') &&
              /TEST-.*\.xml$/.test(f)
            );
            const pass1Xmls = allFiles.filter(f =>
              f.includes('pass1-reports') &&
              f.includes('failsafe-reports') &&
              /TEST-.*\.xml$/.test(f)
            );
            console.log(`PASS 2 failsafe XML files: ${pass2Xmls.length}`);
            console.log(`PASS 1 failsafe XML files: ${pass1Xmls.length}`);

            const failures = []; // { scenario, classname, message, type, stack, location }

            // Order-independent attribute extractor.
            function attr(tag, name) {
              const re = new RegExp(`\\b${name}\\s*=\\s*"([^"]*)"`);
              const m = tag.match(re);
              return m ? m[1] : '';
            }

            function parseXmls(xmlList) {
              const found = [];
              for (const xml of xmlList) {
                const content = fs.readFileSync(xml, 'utf8');
                const caseRegex = /<testcase\b([^>]*?)(\/>|>([\s\S]*?)<\/testcase>)/g;
                let m;
                while ((m = caseRegex.exec(content)) !== null) {
                  const tagAttrs = m[1];
                  const inner = m[3] || '';
                  const name = attr(tagAttrs, 'name');
                  const classname = attr(tagAttrs, 'classname');
                  if (!name) continue;
                  const failBlockRe = /<(failure|error)\b([^>]*?)(\/>|>([\s\S]*?)<\/\1>)/;
                  const failMatch = inner.match(failBlockRe);
                  if (!failMatch) continue;
                  const failAttrs = failMatch[2];
                  const stackRaw = failMatch[4] || '';
                  const message = attr(failAttrs, 'message');
                  const type = attr(failAttrs, 'type');
                  const stack = stackRaw
                    .replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '')
                    .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                    .trim();
                  found.push({ scenario: name, classname, message, type, stack });
                }
              }
              return found;
            }

            failures.push(...parseXmls(pass2Xmls));
            console.log(`Parsed ${failures.length} <failure>/<error> entries from PASS 2 XML.`);

            if (failures.length === 0 && pass1Xmls.length > 0) {
              console.log(`PASS 2 yielded 0 failures — falling back to PASS 1 snapshot.`);
              failures.push(...parseXmls(pass1Xmls));
              console.log(`After PASS 1 fallback: ${failures.length} failure(s).`);
            }

            // If we STILL have no failures AND no rerun.txt entries, the job
            // probably ran with test_outcome=failure for non-test reasons
            // (e.g. Maven crash). Skip issue creation in that edge case.
            if (failures.length === 0 && failedLocations.length === 0) {
              console.log('⚠️ No failures parsed and no rerun.txt entries — skipping issue creation.');
              return;
            }

            // ── Dedupe failures by scenario+classname ────────────────────────
            // Cucumber + JUnit5 + Failsafe can emit the same scenario in multiple
            // XML files (e.g., suite-level + per-feature reporter). Keep only one
            // entry per unique scenario.
            const beforeDedupe = failures.length;
            const seen = new Set();
            const uniqueFailures = [];
            for (const f of failures) {
              const key = `${f.classname}::${f.scenario}`;
              if (seen.has(key)) continue;
              seen.add(key);
              uniqueFailures.push(f);
            }
            console.log(`Failures: ${beforeDedupe} raw → ${uniqueFailures.length} unique after dedupe`);
            failures.length = 0;
            failures.push(...uniqueFailures);

            // ── 3. Render structured issue body ──────────────────────────────
            if (failures.length) {
              // Group failures by SITE + FEATURE FILE
              // e.g., "src/test/resources/features/saucedemo/login.feature:7" → site="saucedemo", feature="login.feature"
              const siteFeatureMap = new Map(); // "saucedemo/login.feature" → [failures]
              const siteMap = new Map(); // "saucedemo" → { feature1: [...], feature2: [...] }
              
              for (const loc of failedLocations) {
                // Extract site name and feature file
                // e.g., "src/test/resources/features/saucedemo/login.feature:7"
                const parts = loc.split('/');
                const featureName = parts[parts.length - 1].split(':')[0]; // "login.feature:7" → "login.feature"
                const siteName = parts[parts.length - 2]; // "saucedemo"
                const key = `${siteName}/${featureName}`;
                
                if (!siteMap.has(siteName)) {
                  siteMap.set(siteName, new Map());
                }
                if (!siteMap.get(siteName).has(featureName)) {
                  siteMap.get(siteName).set(featureName, []);
                }
              }
              
              // Assign each failure to site + feature file
              for (const f of failures) {
                let siteName = null;
                let featureName = null;
                
                // First try: extract from stack trace
                const stackLines = f.stack.split('\n');
                for (const line of stackLines) {
                  const pathMatch = line.match(/features\/(\w+)\/(\w+\.feature):/);
                  if (pathMatch) {
                    siteName = pathMatch[1]; // e.g., "saucedemo"
                    featureName = pathMatch[2]; // e.g., "login.feature"
                    break;
                  }
                }
                
                // Second try: match via failedLocations
                if (!siteName && !featureName && failedLocations.length > 0) {
                  const parts = failedLocations[0].split('/');
                  featureName = parts[parts.length - 1].split(':')[0];
                  siteName = parts[parts.length - 2];
                }
                
                // Fallback
                if (!siteName) siteName = 'unknown-site';
                if (!featureName) featureName = 'unknown.feature';
                
                if (!siteMap.has(siteName)) {
                  siteMap.set(siteName, new Map());
                }
                if (!siteMap.get(siteName).has(featureName)) {
                  siteMap.get(siteName).set(featureName, []);
                }
                siteMap.get(siteName).get(featureName).push(f);
                console.log(`Mapped: "${f.scenario}" → ${siteName}/${featureName}`);
              }
              
              // Create summary header
              body += `## Failed Scenarios by Website\n\n`;
              body += `The following test scenarios failed across **${siteMap.size}** website(s). Each failure is grouped by site and feature file for easy analysis.\n\n`;
              
              // Count failures per site
              const siteCounts = new Map();
              for (const [site, features] of siteMap) {
                let count = 0;
                for (const failures of features.values()) {
                  count += failures.length;
                }
                siteCounts.set(site, count);
              }
              
              // Render by site (with nice emoji indicators)
              const siteEmoji = {
                'saucedemo': '🍅',
                'herokuapp': '🦸',
                'magento': '🛒'
              };
              
              for (const [siteName, features] of siteMap) {
                const emoji = siteEmoji[siteName] || '🌐';
                const count = siteCounts.get(siteName);
                body += `### ${emoji} ${siteName.charAt(0).toUpperCase() + siteName.slice(1)} (${count} failure${count !== 1 ? 's' : ''})\n\n`;
                
                // Render features under this site
                for (const [featureName, siteFeatureFailures] of features) {
                  body += `#### 📄 ${featureName}\n\n`;
                  
                  for (const f of siteFeatureFailures.slice(0, 10)) {
                    body += `**❌ ${f.scenario}** (Scenario)\n`;
                    
                    // Extract the specific failed Gherkin step from stack
                    const stepLines = f.stack.split('\n').filter(l => /\bat\b.*\.feature:\d+/.test(l) || /^\s*[✽✓✗].+\.feature:\d+/.test(l));
                    let failedStep = '';
                    if (stepLines.length > 0) {
                      const firstStep = stepLines[0].trim();
                      const stepMatch = firstStep.match(/[✽✓✗]\.(.+?)\s*\(file:/);
                      if (stepMatch && stepMatch[1]) {
                        failedStep = stepMatch[1].trim();
                      }
                    }
                    if (failedStep) {
                      body += `**Failed step:** \`${failedStep}\`\n\n`;
                    }
                    
                    body += `- **Class:** \`${f.classname}\`\n`;
                    body += `- **Error type:** \`${f.type}\`\n`;
                    body += `- **Message:** ${f.message || '_(no message)_'}\n\n`;
                    
                    // Show all failed steps in details
                    if (stepLines.length) {
                      body += `**All Failed Gherkin Steps:**\n`;
                      for (const s of stepLines.slice(0, 5)) body += `> ${s.trim()}\n`;
                      body += `\n`;
                    }
                    const trimmedStack = f.stack.split('\n').slice(0, 25).join('\n');
                    body += `<details><summary>Stack trace</summary>\n\n\`\`\`\n${trimmedStack}\n\`\`\`\n\n</details>\n\n`;
                  }
                }
              }
              if (failures.length > 10) body += `_…and ${failures.length - 10} more failure(s) — see full reports in workflow artifacts._\n\n`;
            } else {
              // Fallback: dump raw report files if XML parsing yielded nothing
              const reportFiles = allFiles.filter(f => f.endsWith('.txt') || f.endsWith('.xml'));
              for (const file of reportFiles.slice(0, 5)) {
                const content = fs.readFileSync(file, 'utf8').slice(0, 3000);
                if (content.includes('FAILURE') || content.includes('ERROR') || content.includes('<failure')) {
                  body += `### ${path.basename(file)}\n\`\`\`\n${content}\n\`\`\`\n\n`;
                }
              }
            }

            // Close any existing open auto-test-failure issues so a fresh issue
            // triggers a new Copilot agent session (re-assigning the same issue
            // does NOT start a new session).
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-test-failure',
              state: 'open'
            });

            for (const old of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: old.number,
                state: 'closed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: old.number,
                body: `Closing in favour of a new issue — test failures still present. New workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              console.log(`Closed stale issue #${old.number}`);
            }

            // Always create a fresh issue so Copilot agent gets a new assignment
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Test failures detected',
              body,
              labels: ['bug', 'auto-test-failure']
            });
            const issueNumber = created.data.number;
            console.log(`New issue #${issueNumber} created with test failure details.`);

            core.setOutput('issue_number', String(issueNumber));

      - name: Assign Copilot To Issue
        if: (github.event.inputs.rerun_count == '' || github.event.inputs.rerun_count == '0' || github.event.inputs.rerun_count == '1') && steps.issue.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const issueNumber = Number('${{ steps.issue.outputs.issue_number }}');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: ['copilot-swe-agent[bot]'],
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });

            console.log(`Copilot assigned to issue #${issueNumber}`);

      - name: Escalate To JIRA - Retries Exhausted
        if: github.event.inputs.rerun_count != '' && github.event.inputs.rerun_count != '0' && github.event.inputs.rerun_count != '1' && steps.issue.outputs.issue_number != ''
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNumber = '${{ steps.issue.outputs.issue_number }}';
            const rerunCount = '${{ github.event.inputs.rerun_count }}';

            const jiraBase = process.env.JIRA_BASE_URL;
            const jiraEmail = process.env.JIRA_EMAIL;
            const jiraToken = process.env.JIRA_API_TOKEN;
            const projectKey = process.env.JIRA_PROJECT_KEY;

            if (!jiraBase || !jiraEmail || !jiraToken || !projectKey) {
              console.log('JIRA secrets not configured. Skipping JIRA escalation.');
              return;
            }

            const auth = Buffer.from(`${jiraEmail}:${jiraToken}`).toString('base64');

            // ── Walk artifacts ───────────────────────────────────────────────
            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              let out = [];
              for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, e.name);
                out = e.isDirectory() ? out.concat(walk(p)) : out.concat(p);
              }
              return out;
            }
            const allFiles = walk('artifacts');
            const reportFiles = allFiles.filter(f => f.endsWith('.txt') || f.endsWith('.xml'));

            // ── Screenshot discovery ────────────────────────────────────────
            // Serenity stores screenshots as hash-named PNG files directly in
            // target/site/serenity/ (no 'screenshots' subfolder). The per-scenario
            // JSON sibling files list which screenshots belong to a FAILED scenario.
            // We prefer those; if none can be linked, we fall back to all hash-named
            // PNGs in serenity/ (excluding app-icon assets).
            const isHashPng = (f) => {
              const base = path.basename(f);
              return /^[0-9a-f]{32,}\.(png|jpe?g)$/i.test(base);
            };
            const allSerenityPngs = allFiles.filter(f =>
              /[\/\\](site[\/\\])?serenity[\/\\]/.test(f) && isHashPng(f)
            );

            // Try to pick only screenshots belonging to FAILED scenarios via JSON sidecars
            const serenityJsons = allFiles.filter(f =>
              /[\/\\](site[\/\\])?serenity[\/\\][0-9a-f]{32,}\.json$/i.test(f)
            );
            const failureShotNames = new Set();
            for (const jf of serenityJsons) {
              try {
                const txt = fs.readFileSync(jf, 'utf8');
                if (!/"result"\s*:\s*"(FAILURE|ERROR|COMPROMISED)"/i.test(txt)) continue;
                const shotRe = /"screenshot"\s*:\s*"([^"]+\.(?:png|jpe?g))"/gi;
                let sm;
                while ((sm = shotRe.exec(txt)) !== null) failureShotNames.add(path.basename(sm[1]));
              } catch (_) { /* ignore */ }
            }
            let screenshots = allSerenityPngs.filter(f => failureShotNames.has(path.basename(f)));
            if (screenshots.length === 0) screenshots = allSerenityPngs;
            screenshots = screenshots.slice(0, 10);
            console.log(`Screenshots found: ${screenshots.length} (failure-linked: ${failureShotNames.size}) — ${screenshots.map(f => path.basename(f)).join(', ')}`);

            // ── Extract failed scenarios from rerun.txt or failsafe XML ─────
            let failedScenarios = [];
            const rerunArtifact = allFiles.find(f => f.endsWith('rerun.txt'));
            if (rerunArtifact) {
              failedScenarios = fs.readFileSync(rerunArtifact, 'utf8')
                .split('\n').map(s => s.replace(/^file:/, '').trim()).filter(Boolean);
            }

            // ── Extract actual Gherkin steps from failures ──────────────────
            // Prefer PASS 2 (post-rerun) XML; fall back to PASS 1 snapshot when
            // PASS 2 produced none. Both parsers are attribute-order independent
            // and tolerate self-closing tags.
            const pass2Xmls = allFiles.filter(f =>
              f.includes('failsafe-reports') &&
              !f.includes('pass1-reports') &&
              /TEST-.*\.xml$/.test(f)
            );
            const pass1Xmls = allFiles.filter(f =>
              f.includes('pass1-reports') &&
              f.includes('failsafe-reports') &&
              /TEST-.*\.xml$/.test(f)
            );
            function attr(tag, name) {
              const re = new RegExp(`\\b${name}\\s*=\\s*"([^"]*)"`);
              const m = tag.match(re); return m ? m[1] : '';
            }
            function parseXmls(xmlList) {
              const out = [];
              for (const xml of xmlList) {
                const content = fs.readFileSync(xml, 'utf8');
                const caseRegex = /<testcase\b([^>]*?)(\/>|>([\s\S]*?)<\/testcase>)/g;
                let m;
                while ((m = caseRegex.exec(content)) !== null) {
                  const tagAttrs = m[1];
                  const inner = m[3] || '';
                  const name = attr(tagAttrs, 'name');
                  const classname = attr(tagAttrs, 'classname');
                  if (!name) continue;
                  const failBlockRe = /<(failure|error)\b([^>]*?)(\/>|>([\s\S]*?)<\/\1>)/;
                  const failMatch = inner.match(failBlockRe);
                  if (!failMatch) continue;
                  const failAttrs = failMatch[2];
                  const stackRaw = failMatch[4] || '';
                  const message = attr(failAttrs, 'message');
                  const type = attr(failAttrs, 'type');
                  const stack = stackRaw
                    .replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '')
                    .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                    .trim();
                  out.push({ scenario: name, classname, message, type, stack });
                }
              }
              return out;
            }
            const failures = parseXmls(pass2Xmls);
            console.log(`Parsed ${failures.length} <failure>/<error> entries from PASS 2 XML.`);
            if (failures.length === 0 && pass1Xmls.length > 0) {
              console.log(`PASS 2 yielded 0 failures — falling back to PASS 1 snapshot (${pass1Xmls.length} XML file(s)).`);
              failures.push(...parseXmls(pass1Xmls));
              console.log(`After PASS 1 fallback: ${failures.length} failure(s).`);
            }

            // Dedupe by scenario+classname
            const seen = new Set();
            const uniqueFailures = [];
            for (const f of failures) {
              const key = `${f.classname}::${f.scenario}`;
              if (seen.has(key)) continue;
              seen.add(key);
              uniqueFailures.push(f);
            }
            failures.length = 0;
            failures.push(...uniqueFailures);

            // ── Pair each failure with its source feature file + line ──────
            // Stack frames look like: at ✽.Given I open the page (file:features/X/y.feature:5)
            // or:                     at features.X.y.feature:5
            for (const f of failures) {
              const lines = f.stack.split('\n');
              let featurePath = '', featureLine = '';
              for (const ln of lines) {
                const mm = ln.match(/(?:file:)?((?:src[\/\\]test[\/\\]resources[\/\\])?features[\/\\][^:\s)]+\.feature):(\d+)/);
                if (mm) { featurePath = mm[1].replace(/^src[\/\\]test[\/\\]resources[\/\\]/, ''); featureLine = mm[2]; break; }
              }
              f.featurePath = featurePath;
              f.featureLine = featureLine;
            }

            // ── Read each failed scenario's full Gherkin steps from .feature ─
            function readScenarioSteps(featureRel, lineNum) {
              if (!featureRel) return [];
              const candidates = [
                path.join('src', 'test', 'resources', featureRel),
                featureRel,
                path.join('src', 'test', 'resources', featureRel.replace(/^features[\/\\]/, 'features/')),
              ];
              let abs = candidates.find(p => fs.existsSync(p));
              if (!abs) return [];
              const all = fs.readFileSync(abs, 'utf8').split(/\r?\n/);
              const target = lineNum ? parseInt(lineNum, 10) - 1 : -1;
              // Find the Scenario block containing line `target`
              let startIdx = -1, scenarioName = '';
              for (let i = (target >= 0 ? target : all.length - 1); i >= 0; i--) {
                const t = all[i].trim();
                const sm = t.match(/^Scenario(?:\s+Outline)?:\s*(.+)$/);
                if (sm) { startIdx = i; scenarioName = sm[1].trim(); break; }
              }
              if (startIdx < 0) return [];
              const steps = [];
              for (let i = startIdx + 1; i < all.length; i++) {
                const raw = all[i];
                const t = raw.trim();
                if (!t) continue;
                if (/^(Scenario(?:\s+Outline)?|Feature|Background|Examples|Rule):/i.test(t)) break;
                if (/^@/.test(t)) break;
                if (/^(Given|When|Then|And|But|\*)\b/i.test(t)) steps.push(t);
              }
              return steps;
            }

            // ── Build bug-style summary from first failure (or scenario list) ─
            const runUrl     = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const ghIssueUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`;
            const env        = "${{ github.event.inputs.env || 'qa' }}";
            const site       = "${{ github.event.inputs.site || 'all' }}";

            let bugSummary;
            if (failures.length > 0) {
              const f0 = failures[0];
              const featureName = f0.featurePath
                ? path.basename(f0.featurePath, '.feature').replace(/[_-]+/g, ' ')
                : (f0.classname || 'unknown');
              const extra = failures.length > 1 ? ` (+${failures.length - 1} more)` : '';
              bugSummary = `Test Failure: ${featureName} — ${f0.scenario}${extra}`;
            } else if (failedScenarios.length > 0) {
              const first = failedScenarios[0].split(':')[0].split(/[\/\\]/).pop().replace(/\.feature$/, '');
              const extra = failedScenarios.length > 1 ? ` (+${failedScenarios.length - 1} more)` : '';
              bugSummary = `Test Failure: ${first}${extra}`;
            } else {
              bugSummary = `Test Failure: Automated regression suite — GitHub #${issueNumber}`;
            }

            // ── Build Atlassian Document Format (ADF) description ────────────
            const heading = (text, level = 2) => ({ type: 'heading', attrs: { level }, content: [{ type: 'text', text }] });
            const para    = (text)            => ({ type: 'paragraph', content: [{ type: 'text', text }] });
            const code    = (text)            => ({ type: 'codeBlock', attrs: { language: 'text' }, content: [{ type: 'text', text }] });
            const link    = (text, href)      => ({ type: 'paragraph', content: [{ type: 'text', text, marks: [{ type: 'link', attrs: { href } }] }] });
            const bullets = (items)           => ({ type: 'bulletList', content: items.map(t => ({ type: 'listItem', content: [{ type: 'paragraph', content: [{ type: 'text', text: t }] }] })) });

            // ── Build "Steps to Reproduce" covering ALL failed scenarios ─────
            const stepsContent = [];
            stepsContent.push(para(`1. Clone repository and checkout master branch.`));
            const mvnCmd = `2. Run: mvn clean verify -Denv=${env}` + (site && site !== 'all' ? ` -Dcucumber.filter.tags=@${site}` : '');
            stepsContent.push(para(mvnCmd));
            stepsContent.push(para(`3. Reproduce the following failed scenario(s):`));

            if (failures.length > 0) {
              for (let i = 0; i < failures.length; i++) {
                const f = failures[i];
                const featLabel = f.featurePath ? `${f.featurePath}${f.featureLine ? ':' + f.featureLine : ''}` : (f.classname || '');
                stepsContent.push(heading(`${i + 1}. ${f.scenario}`, 3));
                if (featLabel) stepsContent.push(para(`Feature: ${featLabel}`));
                const gherkin = readScenarioSteps(f.featurePath, f.featureLine);
                if (gherkin.length > 0) {
                  stepsContent.push(bullets(gherkin));
                } else {
                  // Fallback: extract step lines from the stack trace
                  const stackSteps = f.stack.split('\n')
                    .map(l => l.trim())
                    .filter(l => /[✽✓✗]\..+\(file:/.test(l))
                    .map(l => {
                      const mm = l.match(/[✽✓✗]\.(.+?)\s*\(file:/);
                      return mm ? mm[1].trim() : l;
                    });
                  stepsContent.push(stackSteps.length ? bullets(stackSteps) : para('(Gherkin steps unavailable — see Failure Details below.)'));
                }
              }
            } else if (failedScenarios.length > 0) {
              for (let i = 0; i < failedScenarios.length; i++) {
                const loc = failedScenarios[i];
                const mm = loc.match(/^(.+\.feature):(\d+)$/);
                const featPath = mm ? mm[1] : loc;
                const featLine = mm ? mm[2] : '';
                stepsContent.push(heading(`${i + 1}. ${path.basename(featPath)}${featLine ? ':' + featLine : ''}`, 3));
                const gherkin = readScenarioSteps(featPath.replace(/^.*?(features[\/\\])/, '$1'), featLine);
                stepsContent.push(gherkin.length ? bullets(gherkin) : para(`Location: ${loc}`));
              }
            } else {
              stepsContent.push(para('No failed scenarios could be enumerated — see Failure Details below.'));
            }

            // ── Failure Details: per-scenario message + trimmed stack ────────
            const failureDetails = [];
            if (failures.length > 0) {
              for (let i = 0; i < failures.length; i++) {
                const f = failures[i];
                failureDetails.push(heading(`${i + 1}. ${f.scenario}`, 3));
                if (f.classname) failureDetails.push(para(`Class: ${f.classname}`));
                if (f.type)      failureDetails.push(para(`Type: ${f.type}`));
                if (f.message)   failureDetails.push(para(`Message: ${f.message}`));
                const trimmedStack = f.stack.split('\n').slice(0, 30).join('\n').slice(0, 3500);
                if (trimmedStack) failureDetails.push(code(trimmedStack));
              }
            } else {
              failureDetails.push(para('See attached failsafe reports.'));
            }

            const adfContent = [
              heading('Environment'),
              bullets([
                `Environment: ${env}`,
                `Site filter: ${site}`,
                `Repository: ${context.repo.owner}/${context.repo.repo}`,
                `Detected at: ${new Date().toISOString()}`,
                `Retry attempts exhausted: ${rerunCount}`,
              ]),

              heading('Failed Scenarios'),
              failures.length
                ? bullets(failures.map(f => `${f.scenario}${f.featurePath ? ` — ${f.featurePath}${f.featureLine ? ':' + f.featureLine : ''}` : ''}`))
                : (failedScenarios.length ? bullets(failedScenarios) : para('Could not extract individual scenario list (see GitHub Actions log).')),

              heading('Steps to Reproduce'),
              ...stepsContent,

              heading('Failure Details'),
              ...failureDetails,

              heading('Links'),
              link('GitHub Actions Run', runUrl),
              link('GitHub Issue', ghIssueUrl),

              heading('Attachments'),
              para(screenshots.length
                ? `${screenshots.length} Serenity failure screenshot(s) attached.`
                : 'No screenshots captured for this run.'),
            ];

            // ── Search for existing JIRA (dedup by GH issue # label) ─────────
            const ghLabel = `gh-issue-${issueNumber}`;
            const jql = `project = "${projectKey}" AND labels = "${ghLabel}" AND status != Done AND status != Closed`;
            const searchResp = await fetch(`${jiraBase}/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=1`, {
              headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
            });
            const searchData = await searchResp.json();

            let jiraKey;
            if (searchData.total > 0) {
              jiraKey = searchData.issues[0].key;
              await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/comment`, {
                method: 'POST',
                headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  body: {
                    type: "doc", version: 1,
                    content: [para(`⚠️ Copilot agent failed to fix after ${rerunCount} retries. Manual intervention required. Run: ${runUrl}`)]
                  }
                })
              });
              console.log(`Updated existing JIRA issue ${jiraKey} with retry-exhausted notice.`);
            } else {
              // ── Auto-detect issue type (JIRA project names vary) ───────────
              const itResp = await fetch(`${jiraBase}/rest/api/3/project/${projectKey}`, {
                headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
              });
              const itData = await itResp.json();
              const availableTypes = (itData.issueTypes || []).map(t => t.name);
              console.log(`Available issue types: ${availableTypes.join(', ')}`);
              const preferred = ['Bug', 'Defect', 'Task', 'Story', 'Improvement'];
              const issueTypeName = preferred.find(p => availableTypes.some(a => a.toLowerCase() === p.toLowerCase()))
                || availableTypes[0] || 'Task';
              console.log(`Using issue type: ${issueTypeName}`);

              const createResp = await fetch(`${jiraBase}/rest/api/3/issue`, {
                method: 'POST',
                headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  fields: {
                    project: { key: projectKey },
                    summary: bugSummary,
                    description: { type: "doc", version: 1, content: adfContent },
                    issuetype: { name: issueTypeName },
                    labels: ["auto-test-failure", "self-healing-framework", "retries-exhausted", ghLabel],
                    priority: { name: "Highest" }
                  }
                })
              });
              const jiraData = await createResp.json();

              if (!jiraData.key) {
                console.log(`JIRA creation failed: ${JSON.stringify(jiraData)}`);
                core.warning('Failed to create JIRA bug. Check JIRA secrets and project config.');
                return;
              }
              jiraKey = jiraData.key;
              console.log(`🐛 JIRA Bug created: ${jiraKey}`);
              console.log(`🔗 View in JIRA: ${jiraBase}/browse/${jiraKey}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                body: `⚠️ **Copilot agent failed after ${rerunCount} retries.** JIRA defect escalated for manual intervention:\n\n🔗 [${jiraKey}](${jiraBase}/browse/${jiraKey})`
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                labels: ['needs-manual-fix']
              });
            }

            // ── Attach screenshots to JIRA ───────────────────────────────────
            for (const shot of screenshots) {
              try {
                const data = fs.readFileSync(shot);
                const formData = new FormData();
                formData.append('file', new Blob([data]), path.basename(shot));
                const attachResp = await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/attachments`, {
                  method: 'POST',
                  headers: {
                    'Authorization': `Basic ${auth}`,
                    'X-Atlassian-Token': 'no-check'
                  },
                  body: formData
                });
                if (attachResp.ok) {
                  console.log(`📎 Attached ${path.basename(shot)} to ${jiraKey}`);
                } else {
                  console.log(`⚠️ Failed to attach ${path.basename(shot)}: ${attachResp.status}`);
                }
              } catch (e) {
                console.log(`⚠️ Error attaching ${shot}: ${e.message}`);
              }
            }

