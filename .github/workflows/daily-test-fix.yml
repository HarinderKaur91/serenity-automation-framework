name: Daily Test And Auto Fix

run-name: >-
  ${{ github.event.inputs.rerun_count != '' && github.event.inputs.rerun_count != '0'
      && format('Rerun {0} - Verify Fix', github.event.inputs.rerun_count)
      || 'Daily Test And Auto Fix' }}

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to test'
        required: false
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - prod
      rerun_count:
        description: 'Rerun attempt number'
        required: false
        default: '0'
      site:
        description: 'Which site(s) to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - saucedemo
          - herokuapp
          - magento
  pull_request:
    types: [closed]
    branches: [master]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  run-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.env != '' && inputs.env || 'qa')) || fromJson('["qa"]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Tests
        id: run
        run: |
          # Resolve site → cucumber tag filter ("all" → no filter)
          SITE_INPUT="${{ github.event.inputs.site }}"
          if [ -n "$SITE_INPUT" ] && [ "$SITE_INPUT" != "all" ]; then
            TAG_ARG="-Dcucumber.filter.tags=@${SITE_INPUT}"
            echo "🏷️  Filtering scenarios with: $TAG_ARG"
          else
            TAG_ARG=""
            echo "🏷️  No site filter — running all sites"
          fi

          if [ "${{ github.event.inputs.rerun_count }}" != "0" ] && [ "${{ github.event.inputs.rerun_count }}" != "" ]; then
            # ── MANUAL RERUN (triggered after Copilot fix) ──────────────────────
            echo "========================================================"
            echo "🔄 MANUAL RERUN ${{ github.event.inputs.rerun_count }}: Re-running full suite to verify the Copilot fix..."
            echo "========================================================"
            mvn clean verify -Denv=${{ matrix.env }} -Dheadless.mode=true $TAG_ARG
          else
            # ── INITIAL SCHEDULED / FIRST RUN ───────────────────────────────────
            echo "========================================================"
            echo "🚀 PASS 1: Running full test suite..."
            echo "========================================================"
            set +e
            mvn clean verify -Denv=${{ matrix.env }} -Dheadless.mode=true $TAG_ARG
            PASS1_EXIT=$?
            set -e

            PARSER=".github/scripts/parse_failsafe.py"

            # Diagnostic: list what's in target/ so we can confirm reports were generated
            echo "── Diagnostic: target/ contents ──"
            ls -la target/ 2>/dev/null || echo "target/ missing"
            echo "── Diagnostic: failsafe-reports/ contents ──"
            ls -la target/failsafe-reports/ 2>/dev/null || echo "target/failsafe-reports/ missing"
            echo "── Diagnostic: surefire-reports/ contents ──"
            ls -la target/surefire-reports/ 2>/dev/null || echo "target/surefire-reports/ missing"

            FAILED_COUNT=$(python3 "$PARSER" count 2>/dev/null || echo 0)
            echo "── Diagnostic: PASS1_EXIT=$PASS1_EXIT FAILED_COUNT=$FAILED_COUNT ──"

            # ── Snapshot PASS 1 reports BEFORE any PASS 2 `mvn clean` wipes them.
            # The email is sent from this snapshot so the user always sees the
            # original (PASS 1) result set, not just the rerun subset.
            mkdir -p pass1-reports
            if [ -d "target/site/serenity" ]; then
              cp -r target/site/serenity pass1-reports/serenity
              echo "📸 Snapshotted PASS 1 Serenity report → pass1-reports/serenity"
            fi
            if [ -d "target/failsafe-reports" ]; then
              cp -r target/failsafe-reports pass1-reports/failsafe-reports
              echo "📸 Snapshotted PASS 1 failsafe reports → pass1-reports/failsafe-reports"
            fi
            if [ -f "target/rerun.txt" ]; then
              cp target/rerun.txt pass1-reports/rerun.txt
            fi

            if [ "$PASS1_EXIT" -eq 0 ] && [ "$FAILED_COUNT" -eq 0 ]; then
              echo "========================================================"
              echo "✅ PASS 1: All tests passed! Nothing to rerun."
              echo "========================================================"
            else
              echo "========================================================"
              echo "❌ PASS 1: Test issues detected (exit=$PASS1_EXIT, failed/skipped/error count=$FAILED_COUNT). Re-running ONLY failed scenarios..."
              echo "========================================================"

              # Cucumber's rerun plugin writes failed scenario URIs to target/rerun.txt,
              # one per line, e.g.:
              #   src/test/resources/features/saucedemo/login.feature:7
              if [ -s "target/rerun.txt" ]; then
                echo "── Failed scenarios (target/rerun.txt) ──"
                cat target/rerun.txt
                echo "─────────────────────────────────────────"

                # Stash the rerun file because `mvn clean` would delete it,
                # then convert lines to a comma-separated value for cucumber.features.
                # Strip any leading `file:` prefix that older Cucumber versions emit,
                # and prepend `./` so paths are unambiguously resolved relative to CWD
                # (otherwise Cucumber discovery can silently produce 0 tests).
                cp target/rerun.txt rerun.txt
                FAILED_FEATURES=$(sed 's|^file:||; s|^|./|' rerun.txt | paste -sd,)
                echo "🔄 PASS 2: cucumber.features=$FAILED_FEATURES"

                set +e
                mvn clean verify -Denv=${{ matrix.env }} -Dheadless.mode=true \
                  -Dcucumber.features="$FAILED_FEATURES"
                PASS2_EXIT=$?
                set -e
                rm -f rerun.txt

                PASS2_FAILED=$(python3 "$PARSER" count 2>/dev/null || echo 0)
                echo "── Diagnostic: PASS2_EXIT=$PASS2_EXIT PASS2_FAILED=$PASS2_FAILED ──"

                if [ "$PASS2_EXIT" -eq 0 ] && [ "$PASS2_FAILED" -eq 0 ]; then
                  echo "========================================================"
                  echo "✅ PASS 2: Previously failed scenarios now pass — flaky failures only. No issue raised."
                  echo "========================================================"
                else
                  echo "========================================================"
                  echo "❌ PASS 2: Failures persist on rerun. Raising GitHub issue for investigation..."
                  echo "========================================================"
                  exit 1
                fi
              else
                echo "========================================================"
                echo "⚠️  PASS 1: Failed but target/rerun.txt is missing/empty."
                echo "🔄 PASS 2 (fallback): Re-running full suite once before raising issue..."
                echo "========================================================"
                set +e
                mvn verify -Denv=${{ matrix.env }} -Dheadless.mode=true $TAG_ARG
                PASS2_EXIT=$?
                set -e
                PASS2_FAILED=$(python3 "$PARSER" count 2>/dev/null || echo 0)
                echo "── Diagnostic: PASS2_EXIT=$PASS2_EXIT PASS2_FAILED=$PASS2_FAILED ──"
                if [ "$PASS2_EXIT" -eq 0 ] && [ "$PASS2_FAILED" -eq 0 ]; then
                  echo "✅ PASS 2 (fallback): All tests now pass! Likely flaky."
                else
                  echo "❌ PASS 2 (fallback): Still failing. Raising GitHub issue..."
                  exit 1
                fi
              fi
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

      - name: Save test outcome
        if: always()
        run: |
          echo "Test outcome: ${{ steps.run.outcome }}" > test-outcome.txt

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.env }}
          path: |
            test-outcome.txt
            pass1-reports/
            target/failsafe-reports/
            target/site/serenity/
            target/rerun.txt
          if-no-files-found: warn

      - name: Locate & Package Serenity Report
        if: always()
        id: report
        run: |
          echo "── Contents of pass1-reports/serenity/ ──"
          ls -la pass1-reports/serenity/ 2>/dev/null | head -20 || echo "PASS 1 snapshot missing"
          echo "── Contents of target/site/serenity/ ──"
          ls -la target/site/serenity/ 2>/dev/null | head -20 || echo "target/site/serenity/ missing"

          # Prefer the PASS 1 snapshot so the email always reflects the original
          # (full) test run, not the rerun subset from PASS 2.
          REPORT_DIR=""
          if [ -d "pass1-reports/serenity" ] && [ -f "pass1-reports/serenity/index.html" ]; then
            REPORT_DIR="pass1-reports/serenity"
            echo "✅ Using PASS 1 snapshot: $REPORT_DIR"
          elif [ -d "target/site/serenity" ] && [ -f "target/site/serenity/index.html" ]; then
            REPORT_DIR="target/site/serenity"
            echo "✅ Using current build: $REPORT_DIR"
          else
            echo "⚠️ No Serenity report directory with index.html found"
            echo "report_zip=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count test files to verify report has content
          FILE_COUNT=$(find "$REPORT_DIR" -type f | wc -l)
          echo "📊 Report contains $FILE_COUNT files"
          
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "⚠️ Report directory seems sparse ($FILE_COUNT files) — may not have test data"
          fi

          # Build a ZIP of the ENTIRE Serenity report directory
          # Includes index.html + all CSS/JS/data/screenshots/reports
          # This ensures everything loads properly when extracted
          ZIP_PATH="serenity-full-report-${{ matrix.env }}.zip"
          echo "Creating ZIP: $ZIP_PATH from $REPORT_DIR"
          
          if [ "$FILE_COUNT" -gt 0 ]; then
            (cd "$(dirname $REPORT_DIR)" && zip -qr "$OLDPWD/$ZIP_PATH" "$(basename $REPORT_DIR)")
            ZIP_SIZE=$(du -h "$ZIP_PATH" | cut -f1)
            echo "report_zip=$ZIP_PATH" >> $GITHUB_OUTPUT
            echo "✅ Zipped full report → $ZIP_PATH ($ZIP_SIZE with $FILE_COUNT files)"
            ls -lh "$ZIP_PATH"
          else
            echo "⚠️ Report directory is empty, skipping ZIP"
            echo "report_zip=" >> $GITHUB_OUTPUT
          fi

      - name: Email Test Reports
        if: always() && steps.report.outputs.report_zip != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Test Report [${{ matrix.env }}] — ${{ steps.run.outcome == 'failure' && 'FAILURES DETECTED ❌' || steps.run.outcome == 'success' && 'ALL PASSED ✅' || steps.run.outcome == 'skipped' && 'SKIPPED ⏭️' || 'ERROR ⚠️' }} — ${{ github.repository }}"
          to: harinder.qa.88@gmail.com
          from: Self-Healing Framework <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Hi,

            The daily test run has completed.

            📊 Test Summary
            ───────────────
            Environment: ${{ matrix.env }}
            Status: ${{ steps.run.outcome }}
            Repository: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            📁 Full Serenity Report (ZIP Attached)
            ───────────────────────────────────────
            Extract the ZIP file and open index.html in your browser to view the complete report:

              • All test scenarios with pass/fail details and statistics
              • Individual Gherkin steps with their execution results
              • Failure screenshots and detailed error logs
              • Full test execution timeline and summary
              • Click through each scenario for detailed step logs

            The ZIP contains the complete report directory with all CSS, JavaScript, data files, and screenshots embedded.

            — Self-Healing Test Framework
          attachments: ${{ steps.report.outputs.report_zip }}

      - name: Email Failed - No Report
        if: always() && steps.report.outputs.report_zip == ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Test Report [${{ matrix.env }}] — ⚠️ NO REPORT GENERATED — ${{ github.repository }}"
          to: harinder.qa.88@gmail.com
          from: Self-Healing Framework <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Hi,

            ⚠️ Test run completed but NO Serenity report was generated.

            Environment: ${{ matrix.env }}
            Status: ${{ steps.run.outcome }}
            Repository: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This could indicate:
              • Maven build failed before generating reports
              • No tests were executed
              • Report directory is missing

            Check the GitHub Actions log for details.

            — Self-Healing Test Framework

  report-success:
    needs: run-tests
    if: needs.run-tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: All Tests Passed
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        with:
          github-token: ${{ github.token }}
          script: |
            const rerunCount = '${{ github.event.inputs.rerun_count }}' || '0';
            const isRerun = rerunCount !== '0' && rerunCount !== '';

            if (isRerun) {
              console.log(`✅ All tests passed on Rerun ${rerunCount}! No further reruns required.`);
              console.log('The Copilot fix has been verified successfully.');

              // Close the auto-test-failure issue if open
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'auto-test-failure',
                state: 'open'
              });

              for (const issue of issues) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ **All tests passed on Rerun ${rerunCount}.** The fix has been verified. Closing this issue.`
                });
                console.log(`Closed issue #${issue.number} - fix verified.`);
              }

              // Transition linked JIRA defects to Done
              const jiraBase = process.env.JIRA_BASE_URL;
              const jiraEmail = process.env.JIRA_EMAIL;
              const jiraToken = process.env.JIRA_API_TOKEN;
              const jiraProject = process.env.JIRA_PROJECT_KEY;

              if (jiraBase && jiraEmail && jiraToken && jiraProject) {
                const auth = Buffer.from(`${jiraEmail}:${jiraToken}`).toString('base64');

                for (const issue of issues) {
                  const jql = `project = "${jiraProject}" AND summary ~ "Auto Test Failure - GitHub #${issue.number}" AND status != Done AND status != Closed`;
                  const searchResp = await fetch(`${jiraBase}/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=1`, {
                    headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
                  });
                  const searchData = await searchResp.json();

                  if (searchData.total > 0) {
                    const jiraKey = searchData.issues[0].key;
                    const jiraId = searchData.issues[0].id;

                    // Get available transitions
                    const transResp = await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/transitions`, {
                      headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
                    });
                    const transData = await transResp.json();
                    const doneTrans = transData.transitions?.find(t =>
                      t.name.toLowerCase().includes('done') || t.name.toLowerCase().includes('close') || t.name.toLowerCase().includes('resolve')
                    );

                    if (doneTrans) {
                      await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/transitions`, {
                        method: 'POST',
                        headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transition: { id: doneTrans.id } })
                      });
                      console.log(`JIRA ${jiraKey} transitioned to "${doneTrans.name}".`);

                      // Add resolution comment
                      await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/comment`, {
                        method: 'POST',
                        headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                          body: {
                            type: "doc", version: 1,
                            content: [{ type: "paragraph", content: [{ type: "text",
                              text: `✅ All tests passed on Rerun ${rerunCount}. Fix verified automatically by the self-healing framework.`
                            }] }]
                          }
                        })
                      });
                    } else {
                      console.log(`No Done/Close transition found for ${jiraKey}. Available: ${transData.transitions?.map(t => t.name).join(', ')}`);
                    }
                  }
                }
              }
            } else {
              console.log('✅ All tests passed! No issues to report. No rerun required.');
            }

  open-issue-and-assign-copilot:
    needs: run-tests
    if: always() && (needs.run-tests.result == 'failure' || needs.run-tests.result == 'error')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: artifacts
          merge-multiple: true

      - name: Create Or Update Issue
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              let out = [];
              for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, e.name);
                out = e.isDirectory() ? out.concat(walk(p)) : out.concat(p);
              }
              return out;
            }

            let body = `## Automated Test Failure\n\n`;
            body += `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;
            body += `> ⚠️ **These are PASS 2 (post-rerun) failures only** — scenarios that failed in the initial run AND still failed after the automatic selective rerun. Flaky scenarios that passed on rerun are excluded.\n\n`;
            body += `Analyze the failures below, identify the root cause, fix the source code, and open a PR.\n\n`;

            const allFiles = walk('artifacts');
            console.log(`Total artifact files found: ${allFiles.length}`);
            console.log(`All XML files in artifacts: ${allFiles.filter(f => /TEST-.*\.xml$/.test(f)).join('\n  ')}`);

            // ── 1. Failed scenario locations from Cucumber rerun.txt ─────────
            // Prefer PASS 2's rerun.txt (target/rerun.txt) over the PASS 1 snapshot.
            // Both list the same failed scenarios, but PASS 2 is the authoritative source.
            const rerunFile =
              allFiles.find(f => f.includes('target') && f.endsWith('rerun.txt')) ||
              allFiles.find(f => !f.includes('pass1-reports') && f.endsWith('rerun.txt')) ||
              allFiles.find(f => f.endsWith('rerun.txt'));
            const failedLocations = rerunFile
              ? [...new Set(
                  fs.readFileSync(rerunFile, 'utf8')
                    .split(/\r?\n/).map(s => s.replace(/^file:/, '').trim()).filter(Boolean)
                )]
              : [];
            console.log(`Using rerun.txt: ${rerunFile || 'none'} (${failedLocations.length} unique entries)`);

            // ── 2. Parse failsafe XML for scenario name + failure message ────
            // Use PASS 2 results ONLY — exclude pass1-reports snapshot so we only
            // show scenarios that STILL FAIL after the rerun (persistent failures).
            const xmlFiles = allFiles.filter(f => 
              f.includes('failsafe-reports') && 
              !f.includes('pass1-reports') && 
              /TEST-.*\.xml$/.test(f)
            );
            console.log(`PASS 2 failsafe XML files (after excluding pass1-reports): ${xmlFiles.length}`);
            console.log(`  Files: ${xmlFiles.join('\n  ')}`);
            
            const failures = []; // { scenario, classname, message, type, stack, location }

            for (const xml of xmlFiles) {
              const content = fs.readFileSync(xml, 'utf8');
              const caseRegex = /<testcase\b[^>]*\bname="([^"]+)"[^>]*\bclassname="([^"]+)"[^>]*>([\s\S]*?)<\/testcase>/g;
              let m;
              while ((m = caseRegex.exec(content)) !== null) {
                const [, name, classname, inner] = m;
                const failMatch = inner.match(/<(failure|error)\b[^>]*\bmessage="([^"]*)"[^>]*\btype="([^"]*)"[^>]*>([\s\S]*?)<\/\1>/);
                if (!failMatch) continue;
                const [, , message, type, stackRaw] = failMatch;
                const stack = stackRaw
                  .replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '')
                  .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                  .trim();
                failures.push({ scenario: name, classname, message, type, stack });
              }
            }

            // ── Dedupe failures by scenario+classname ────────────────────────
            // Cucumber + JUnit5 + Failsafe can emit the same scenario in multiple
            // XML files (e.g., suite-level + per-feature reporter). Keep only one
            // entry per unique scenario.
            const beforeDedupe = failures.length;
            const seen = new Set();
            const uniqueFailures = [];
            for (const f of failures) {
              const key = `${f.classname}::${f.scenario}`;
              if (seen.has(key)) continue;
              seen.add(key);
              uniqueFailures.push(f);
            }
            console.log(`Failures: ${beforeDedupe} raw → ${uniqueFailures.length} unique after dedupe`);
            failures.length = 0;
            failures.push(...uniqueFailures);

            // ── 3. Render structured issue body ──────────────────────────────
            if (failures.length) {
              body += `### Persistent Failures After Rerun — PASS 2 (${failures.length} scenario(s) still failing)\n\n`;
              
              // Extract feature files from failedLocations
              // e.g., "src/test/resources/features/saucedemo/login.feature:7" → "login.feature"
              const featureMap = new Map(); // feature file name → [failures]
              const featureFiles = new Set();
              
              for (const loc of failedLocations) {
                const featureName = loc.split('/').pop().split(':')[0]; // "login.feature:7" → "login.feature"
                featureFiles.add(featureName);
              }
              console.log(`Feature files from rerun.txt: ${Array.from(featureFiles).join(', ')}`);
              
              // Assign each failure to a feature file
              for (const f of failures) {
                // Try to find matching feature file from stack trace or failedLocations
                let featureName = null;
                
                // First try: look for feature file path in the stack trace
                const stackLines = f.stack.split('\n');
                for (const line of stackLines) {
                  const featureMatch = line.match(/(\w+\.feature):(\d+)/);
                  if (featureMatch) {
                    featureName = featureMatch[1]; // e.g., "login.feature"
                    break;
                  }
                }
                
                // Second try: match via failedLocations
                if (!featureName && failedLocations.length > 0) {
                  featureName = failedLocations[0].split('/').pop().split(':')[0];
                }
                
                // Fallback
                if (!featureName) {
                  featureName = 'Scenarios';
                }
                
                if (!featureMap.has(featureName)) {
                  featureMap.set(featureName, []);
                }
                featureMap.get(featureName).push(f);
                console.log(`Mapped failure "${f.scenario}" to feature file "${featureName}"`);
              }

              // Render grouped by feature file
              for (const [featureName, featureFailures] of featureMap.entries()) {
                body += `#### 📄 ${featureName}\n\n`;
                for (const f of featureFailures.slice(0, 10)) {
                  body += `**❌ ${f.scenario}** (Scenario)\n`;
                  
                  // Extract the specific failed Gherkin step from stack
                  // Stack lines typically look like: "at ✽.Given I open... (file:src/...feature:7)"
                  const stepLines = f.stack.split('\n').filter(l => /\bat\b.*\.feature:\d+/.test(l) || /^\s*[✽✓✗].+\.feature:\d+/.test(l));
                  let failedStep = '';
                  if (stepLines.length > 0) {
                    const firstStep = stepLines[0].trim();
                    // Extract step text between symbol and file path
                    const stepMatch = firstStep.match(/[✽✓✗]\.(.+?)\s*\(file:/);
                    if (stepMatch && stepMatch[1]) {
                      failedStep = stepMatch[1].trim();
                    }
                  }
                  if (failedStep) {
                    body += `**Failed step:** \`${failedStep}\`\n\n`;
                  }
                  
                  body += `- **Class:** \`${f.classname}\`\n`;
                  body += `- **Error type:** \`${f.type}\`\n`;
                  body += `- **Message:** ${f.message || '_(no message)_'}\n\n`;
                  
                  // Show all failed steps in details
                  if (stepLines.length) {
                    body += `**All Failed Gherkin Steps:**\n`;
                    for (const s of stepLines.slice(0, 5)) body += `> ${s.trim()}\n`;
                    body += `\n`;
                  }
                  const trimmedStack = f.stack.split('\n').slice(0, 25).join('\n');
                  body += `<details><summary>Stack trace</summary>\n\n\`\`\`\n${trimmedStack}\n\`\`\`\n\n</details>\n\n`;
                }
              }
              if (failures.length > 10) body += `_…and ${failures.length - 10} more failure(s) — see full reports in workflow artifacts._\n\n`;
            } else {
              // Fallback: dump raw report files if XML parsing yielded nothing
              const reportFiles = allFiles.filter(f => f.endsWith('.txt') || f.endsWith('.xml'));
              for (const file of reportFiles.slice(0, 5)) {
                const content = fs.readFileSync(file, 'utf8').slice(0, 3000);
                if (content.includes('FAILURE') || content.includes('ERROR') || content.includes('<failure')) {
                  body += `### ${path.basename(file)}\n\`\`\`\n${content}\n\`\`\`\n\n`;
                }
              }
            }

            // Close any existing open auto-test-failure issues so a fresh issue
            // triggers a new Copilot agent session (re-assigning the same issue
            // does NOT start a new session).
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-test-failure',
              state: 'open'
            });

            for (const old of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: old.number,
                state: 'closed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: old.number,
                body: `Closing in favour of a new issue — test failures still present. New workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              console.log(`Closed stale issue #${old.number}`);
            }

            // Always create a fresh issue so Copilot agent gets a new assignment
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Test failures detected',
              body,
              labels: ['bug', 'auto-test-failure']
            });
            const issueNumber = created.data.number;
            console.log(`New issue #${issueNumber} created with test failure details.`);

            core.setOutput('issue_number', String(issueNumber));

      - name: Assign Copilot To Issue
        if: github.event.inputs.rerun_count == '' || github.event.inputs.rerun_count == '0' || github.event.inputs.rerun_count == '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const issueNumber = Number('${{ steps.issue.outputs.issue_number }}');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: ['copilot-swe-agent[bot]'],
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });

            console.log(`Copilot assigned to issue #${issueNumber}`);

      - name: Escalate To JIRA - Retries Exhausted
        if: github.event.inputs.rerun_count != '' && github.event.inputs.rerun_count != '0' && github.event.inputs.rerun_count != '1'
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNumber = '${{ steps.issue.outputs.issue_number }}';
            const rerunCount = '${{ github.event.inputs.rerun_count }}';

            const jiraBase = process.env.JIRA_BASE_URL;
            const jiraEmail = process.env.JIRA_EMAIL;
            const jiraToken = process.env.JIRA_API_TOKEN;
            const projectKey = process.env.JIRA_PROJECT_KEY;

            if (!jiraBase || !jiraEmail || !jiraToken || !projectKey) {
              console.log('JIRA secrets not configured. Skipping JIRA escalation.');
              return;
            }

            const auth = Buffer.from(`${jiraEmail}:${jiraToken}`).toString('base64');

            // ── Walk artifacts ───────────────────────────────────────────────
            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              let out = [];
              for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, e.name);
                out = e.isDirectory() ? out.concat(walk(p)) : out.concat(p);
              }
              return out;
            }
            const allFiles = walk('artifacts');
            const reportFiles = allFiles.filter(f => f.endsWith('.txt') || f.endsWith('.xml'));
            // Exclude Serenity report asset icons (android-icon-*, favicon-*, etc.)
            // and only keep actual test failure screenshots from the screenshots/ folder
            const screenshots = allFiles.filter(f => {
              const base = path.basename(f);
              return /\.(png|jpe?g)$/i.test(f)
                && !base.startsWith('thumbnail_')
                && !base.startsWith('android-icon-')
                && !base.startsWith('favicon-')
                && !base.startsWith('apple-icon-')
                && f.includes('screenshots');
            }).slice(0, 5); // cap at 5 to avoid huge JIRA tickets
            console.log(`Screenshots found: ${screenshots.length} — ${screenshots.map(f => path.basename(f)).join(', ')}`);

            // ── Extract failed scenarios from rerun.txt or failsafe XML ─────
            let failedScenarios = [];
            const rerunArtifact = allFiles.find(f => f.endsWith('rerun.txt'));
            if (rerunArtifact) {
              failedScenarios = fs.readFileSync(rerunArtifact, 'utf8')
                .split('\n').map(s => s.replace(/^file:/, '').trim()).filter(Boolean);
            }

            // ── Extract actual Gherkin steps from failures ──────────────────
            // Parse failsafe XML to get failure details + stack with Gherkin steps
            const xmlFiles = allFiles.filter(f => 
              f.includes('failsafe-reports') && 
              !f.includes('pass1-reports') && 
              /TEST-.*\.xml$/.test(f)
            );
            const failures = [];
            for (const xml of xmlFiles) {
              const content = fs.readFileSync(xml, 'utf8');
              const caseRegex = /<testcase\b[^>]*\bname="([^"]+)"[^>]*\bclassname="([^"]+)"[^>]*>([\s\S]*?)<\/testcase>/g;
              let m;
              while ((m = caseRegex.exec(content)) !== null) {
                const [, name, classname, inner] = m;
                const failMatch = inner.match(/<(failure|error)\b[^>]*\bmessage="([^"]*)"[^>]*\btype="([^"]*)"[^>]*>([\s\S]*?)<\/\1>/);
                if (!failMatch) continue;
                const [, , message, type, stackRaw] = failMatch;
                const stack = stackRaw
                  .replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '')
                  .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                  .trim();
                failures.push({ scenario: name, classname, message, type, stack });
              }
            }

            // Dedupe by scenario+classname
            const seen = new Set();
            const uniqueFailures = [];
            for (const f of failures) {
              const key = `${f.classname}::${f.scenario}`;
              if (seen.has(key)) continue;
              seen.add(key);
              uniqueFailures.push(f);
            }
            failures.length = 0;
            failures.push(...uniqueFailures);

            // ── Extract failure messages ─────────────────────────────────────
            let failureBlock = '';
            for (const file of reportFiles.slice(0, 5)) {
              const content = fs.readFileSync(file, 'utf8').slice(0, 1500);
              if (content.includes('FAILURE') || content.includes('ERROR') || content.includes('<failure')) {
                failureBlock += `\n--- ${path.basename(file)} ---\n${content}\n`;
              }
            }

            const runUrl     = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const ghIssueUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`;
            const env        = "${{ github.event.inputs.env || 'qa' }}";
            const site       = "${{ github.event.inputs.site || 'all' }}";

            // ── Build Atlassian Document Format (ADF) description ────────────
            const heading = (text, level = 2) => ({ type: 'heading', attrs: { level }, content: [{ type: 'text', text }] });
            const para    = (text)            => ({ type: 'paragraph', content: [{ type: 'text', text }] });
            const code    = (text)            => ({ type: 'codeBlock', attrs: { language: 'text' }, content: [{ type: 'text', text }] });
            const link    = (text, href)      => ({ type: 'paragraph', content: [{ type: 'text', text, marks: [{ type: 'link', attrs: { href } }] }] });
            const bullets = (items)           => ({ type: 'bulletList', content: items.map(t => ({ type: 'listItem', content: [{ type: 'paragraph', content: [{ type: 'text', text: t }] }] })) });

            const adfContent = [
              heading('Summary'),
              para(`Automated test failure could not be auto-fixed by Copilot agent after ${rerunCount} retries. Manual investigation required.`),

              heading('Environment'),
              bullets([
                `Environment: ${env}`,
                `Site filter: ${site}`,
                `Repository: ${context.repo.owner}/${context.repo.repo}`,
                `Detected at: ${new Date().toISOString()}`,
                `Retry attempts exhausted: ${rerunCount}`,
              ]),

              heading('Failed Scenarios'),
              failedScenarios.length
                ? bullets(failedScenarios)
                : para('Could not extract individual scenario list (see GitHub Actions log).'),

              heading('Steps to Reproduce'),
              // Extract Gherkin steps from first failure's stack
              (failures.length > 0 && failures[0].stack)
                ? (() => {
                    const stepLines = failures[0].stack.split('\n').filter(l => /\bat\b.*\.feature:\d+/.test(l) || /^\s*[✽✓✗].+\.feature:\d+/.test(l));
                    return stepLines.length > 0
                      ? bullets(stepLines.slice(0, 10).map(s => {
                          // Extract just the step text: "at ✽.Given I open... (file:...)" → "Given I open..."
                          const match = s.match(/[✽✓✗]\.(.+?)\s*\(file:/);
                          return match && match[1] ? match[1].trim() : s.trim();
                        }))
                      : bullets([
                          `1. Clone repository at master branch`,
                          `2. Run: mvn clean verify -Denv=${env}` + (site !== 'all' ? ` -Dcucumber.filter.tags=@${site}` : ''),
                          `3. Review stack traces in failsafe reports`
                        ]);
                  })()
                : bullets([
                    `1. Clone repository at master branch`,
                    `2. Run: mvn clean verify -Denv=${env}` + (site !== 'all' ? ` -Dcucumber.filter.tags=@${site}` : ''),
                    `3. Review stack traces in failsafe reports`
                  ]),

              heading('Failure Details'),
              failureBlock ? code(failureBlock.slice(0, 4000)) : para('See attached failsafe reports.'),

              heading('Links'),
              link('GitHub Actions Run', runUrl),
              link('GitHub Issue', ghIssueUrl),

              heading('Attachments'),
              para(screenshots.length
                ? `${screenshots.length} Serenity failure screenshot(s) attached.`
                : 'No screenshots captured for this run.'),
            ];

            // ── Search for existing JIRA ─────────────────────────────────────
            const jql = `project = "${projectKey}" AND summary ~ "Auto Test Failure - GitHub #${issueNumber}" AND status != Done AND status != Closed`;
            const searchResp = await fetch(`${jiraBase}/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=1`, {
              headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
            });
            const searchData = await searchResp.json();

            let jiraKey;
            if (searchData.total > 0) {
              jiraKey = searchData.issues[0].key;
              await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/comment`, {
                method: 'POST',
                headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  body: {
                    type: "doc", version: 1,
                    content: [para(`⚠️ Copilot agent failed to fix after ${rerunCount} retries. Manual intervention required. Run: ${runUrl}`)]
                  }
                })
              });
              console.log(`Updated existing JIRA issue ${jiraKey} with retry-exhausted notice.`);
            } else {
              // ── Auto-detect issue type (JIRA project names vary) ───────────
              const itResp = await fetch(`${jiraBase}/rest/api/3/project/${projectKey}`, {
                headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
              });
              const itData = await itResp.json();
              const availableTypes = (itData.issueTypes || []).map(t => t.name);
              console.log(`Available issue types: ${availableTypes.join(', ')}`);
              const preferred = ['Bug', 'Defect', 'Task', 'Story', 'Improvement'];
              const issueTypeName = preferred.find(p => availableTypes.some(a => a.toLowerCase() === p.toLowerCase()))
                || availableTypes[0] || 'Task';
              console.log(`Using issue type: ${issueTypeName}`);

              const createResp = await fetch(`${jiraBase}/rest/api/3/issue`, {
                method: 'POST',
                headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  fields: {
                    project: { key: projectKey },
                    summary: `Auto Test Failure - GitHub #${issueNumber} [${site}/${env}] - Retries Exhausted`,
                    description: { type: "doc", version: 1, content: adfContent },
                    issuetype: { name: issueTypeName },
                    labels: ["auto-test-failure", "self-healing-framework", "retries-exhausted"],
                    priority: { name: "Highest" }
                  }
                })
              });
              const jiraData = await createResp.json();

              if (!jiraData.key) {
                console.log(`JIRA creation failed: ${JSON.stringify(jiraData)}`);
                core.warning('Failed to create JIRA bug. Check JIRA secrets and project config.');
                return;
              }
              jiraKey = jiraData.key;
              console.log(`🐛 JIRA Bug created: ${jiraKey}`);
              console.log(`🔗 View in JIRA: ${jiraBase}/browse/${jiraKey}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                body: `⚠️ **Copilot agent failed after ${rerunCount} retries.** JIRA defect escalated for manual intervention:\n\n🔗 [${jiraKey}](${jiraBase}/browse/${jiraKey})`
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                labels: ['needs-manual-fix']
              });
            }

            // ── Attach screenshots to JIRA ───────────────────────────────────
            for (const shot of screenshots) {
              try {
                const data = fs.readFileSync(shot);
                const formData = new FormData();
                formData.append('file', new Blob([data]), path.basename(shot));
                const attachResp = await fetch(`${jiraBase}/rest/api/3/issue/${jiraKey}/attachments`, {
                  method: 'POST',
                  headers: {
                    'Authorization': `Basic ${auth}`,
                    'X-Atlassian-Token': 'no-check'
                  },
                  body: formData
                });
                if (attachResp.ok) {
                  console.log(`📎 Attached ${path.basename(shot)} to ${jiraKey}`);
                } else {
                  console.log(`⚠️ Failed to attach ${path.basename(shot)}: ${attachResp.status}`);
                }
              } catch (e) {
                console.log(`⚠️ Error attaching ${shot}: ${e.message}`);
              }
            }

  auto-verify-on-pr-merge:
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest
    steps:
      - name: Auto-trigger verification rerun
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          echo "========================================================"
          echo "Copilot fix PR #${{ github.event.pull_request.number }} merged — triggering verification rerun..."
          echo "If this rerun also fails, the failure will be escalated directly to JIRA."
          echo "========================================================"
          gh workflow run daily-test-fix.yml \
            --repo ${{ github.repository }} \
            --ref master \
            --field rerun_count=2 \
            --field env=qa
          echo "✅ Verification rerun dispatched with rerun_count=2 (final attempt before JIRA escalation)."
