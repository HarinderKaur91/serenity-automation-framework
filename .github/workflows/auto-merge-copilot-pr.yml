name: Auto Merge Copilot PR After Approval

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

jobs:
  auto-merge:
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Merge Approved Copilot PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Helper: wait for a given number of seconds
            function sleep(seconds) {
              return new Promise(resolve => setTimeout(resolve, seconds * 1000));
            }

            // Get PR details
            let { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // If the PR is still a draft, mark it as ready for review
            if (pr.draft) {
              console.log(`PR #${prNumber} is a draft. Marking as ready for review...`);
              await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    pullRequest { number }
                  }
                }
              `, { prId: pr.node_id });
              console.log(`PR #${prNumber} marked as ready. Waiting for GitHub to update state...`);

              // Wait and re-fetch until it's no longer a draft (max 60s)
              for (let i = 0; i < 6; i++) {
                await sleep(10);
                const { data: updated } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                if (!updated.draft) {
                  pr = updated;
                  console.log(`PR #${prNumber} is now ready for review.`);
                  break;
                }
                console.log(`Still draft, retrying... (${(i + 1) * 10}s)`);
              }

              if (pr.draft) {
                core.setFailed(`PR #${prNumber} is still a draft after waiting. Please mark it ready manually.`);
                return;
              }
            }

            if (pr.mergeable_state === 'blocked') {
              console.log(`PR #${prNumber} is blocked (pending required checks). Enabling auto-merge...`);
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) {
                      pullRequest { number }
                    }
                  }
                `, { prId: pr.node_id });
                console.log(`Auto-merge enabled on PR #${prNumber}. Will merge when checks pass.`);
              } catch (e) {
                console.log(`Could not enable auto-merge: ${e.message}`);
              }
              return;
            }

            // Wait for mergeable state if unknown
            if (pr.mergeable === null) {
              console.log(`Mergeable state unknown, waiting...`);
              for (let i = 0; i < 6; i++) {
                await sleep(10);
                const { data: updated } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                if (updated.mergeable !== null) {
                  pr = updated;
                  break;
                }
              }
            }

            if (!pr.mergeable) {
              core.setFailed(`PR #${prNumber} is not mergeable. State: ${pr.mergeable_state}`);
              return;
            }

            // Merge the PR using squash
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: 'squash',
              commit_title: `fix: auto-merge Copilot PR #${prNumber}`,
              commit_message: `Automatically merged after human approval.\nCloses #${pr.body?.match(/#(\d+)/)?.[1] || 'unknown'}`
            });

            console.log(`PR #${prNumber} merged successfully!`);

            // Close the related issue if linked
            const issueMatch = pr.body?.match(/#(\d+)/);
            if (issueMatch) {
              try {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: Number(issueMatch[1]),
                  state: 'closed'
                });
                console.log(`Closed related issue #${issueMatch[1]}`);
              } catch (e) {
                console.log(`Could not close issue: ${e.message}`);
              }
            }

      # Verification rerun is dispatched by the auto-verify-on-pr-merge job
      # in daily-test-fix.yml — no need to duplicate here.

  escalate-rejected-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false &&
      startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Extract Issue Number and Failed Tests
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const issueMatch = pr.body?.match(/#(\d+)/);
            const issueNumber = issueMatch ? issueMatch[1] : '';
            core.setOutput('issue_number', issueNumber);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title || 'Copilot PR');
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_body', (pr.body || '').slice(0, 3000));

            // Try to get failed test names from the linked issue body
            let issueTitle = 'Unknown tests';
            let issueBody = '';
            if (issueNumber) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(issueNumber)
                });
                issueTitle = issue.title || issueTitle;
                issueBody = issue.body || '';
              } catch (e) {
                console.log(`Could not fetch issue: ${e.message}`);
              }
            }
            core.setOutput('issue_title', issueTitle);
            core.setOutput('issue_body', issueBody.slice(0, 6000));

      - name: Download latest test artifacts
        id: artifacts
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find the most recent completed daily-test-fix.yml run
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily-test-fix.yml',
              status: 'completed',
              per_page: 5
            });
            const failedRun = runs.workflow_runs.find(r => r.conclusion === 'failure');
            if (!failedRun) {
              console.log('No recent failed daily-test-fix run found.');
              return;
            }
            console.log(`Using artifacts from run #${failedRun.id} (${failedRun.html_url})`);

            const { data: artifactList } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: failedRun.id
            });
            const artifact = artifactList.artifacts.find(a => a.name.startsWith('test-reports-'));
            if (!artifact) {
              console.log('No test-reports artifact in that run.');
              return;
            }

            const dl = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });
            fs.mkdirSync('artifacts', { recursive: true });
            fs.writeFileSync('artifacts.zip', Buffer.from(dl.data));
            require('child_process').execSync('unzip -q -o artifacts.zip -d artifacts');
            console.log('Artifacts extracted to ./artifacts');
            core.setOutput('run_url', failedRun.html_url);

      - name: Create JIRA Bug for Rejected Copilot Fix
        id: jira
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const jiraBase = process.env.JIRA_BASE_URL;
            const jiraEmail = process.env.JIRA_EMAIL;
            const jiraToken = process.env.JIRA_API_TOKEN;
            const projectKey = process.env.JIRA_PROJECT_KEY;
            if (!jiraBase || !jiraEmail || !jiraToken || !projectKey) {
              console.log('JIRA secrets not configured. Skipping JIRA escalation.');
              return;
            }
            const auth = Buffer.from(`${jiraEmail}:${jiraToken}`).toString('base64');

            const prNumber    = '${{ steps.extract.outputs.pr_number }}';
            const prTitle     = `${{ toJSON(steps.extract.outputs.pr_title) }}`;
            const prUrl       = '${{ steps.extract.outputs.pr_url }}';
            const issueNumber = '${{ steps.extract.outputs.issue_number }}';
            const issueTitle  = `${{ toJSON(steps.extract.outputs.issue_title) }}`;
            const issueBody   = `${{ toJSON(steps.extract.outputs.issue_body) }}`;
            const runUrl      = '${{ steps.artifacts.outputs.run_url }}';
            const repo        = '${{ github.repository }}';
            const closedBy    = '${{ github.event.sender.login }}';

            // ── Walk artifacts ─────────────────────────────────────────────
            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              let out = [];
              for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, e.name);
                out = e.isDirectory() ? out.concat(walk(p)) : out.concat(p);
              }
              return out;
            }
            const allFiles = walk('artifacts');
            // Exclude Serenity report asset icons (android-icon-*, favicon-*, etc.)
            // and only keep actual test failure screenshots from the screenshots/ folder
            const screenshots = allFiles.filter(f => {
              const base = path.basename(f);
              return /\.(png|jpe?g)$/i.test(f)
                && !base.startsWith('thumbnail_')
                && !base.startsWith('android-icon-')
                && !base.startsWith('favicon-')
                && !base.startsWith('apple-icon-')
                && f.includes('screenshots');
            }).slice(0, 5);
            console.log(`Screenshots found: ${screenshots.length} — ${screenshots.map(f => path.basename(f)).join(', ')}`);

            // Failed feature locations from rerun.txt
            const rerunFile = allFiles.find(f => f.endsWith('rerun.txt'));
            const failedLocations = rerunFile
              ? fs.readFileSync(rerunFile, 'utf8')
                  .split(/\r?\n/).map(s => s.replace(/^file:/, '').trim()).filter(Boolean)
              : [];

            // Parse failsafe XML for scenario name + failure
            const xmlFiles = allFiles.filter(f => /TEST-.*\.xml$/.test(f));
            const failures = [];
            for (const xml of xmlFiles) {
              const content = fs.readFileSync(xml, 'utf8');
              const caseRegex = /<testcase\b[^>]*\bname="([^"]+)"[^>]*\bclassname="([^"]+)"[^>]*>([\s\S]*?)<\/testcase>/g;
              let m;
              while ((m = caseRegex.exec(content)) !== null) {
                const [, name, classname, inner] = m;
                const failMatch = inner.match(/<(failure|error)\b[^>]*\bmessage="([^"]*)"[^>]*\btype="([^"]*)"[^>]*>([\s\S]*?)<\/\1>/);
                if (!failMatch) continue;
                const [, , message, type, stackRaw] = failMatch;
                const stack = stackRaw
                  .replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '')
                  .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                  .trim();
                failures.push({ scenario: name, classname, message, type, stack });
              }
            }

            // ── Build ADF description ──────────────────────────────────────
            const heading = (text, level = 2) => ({ type: 'heading', attrs: { level }, content: [{ type: 'text', text }] });
            const para    = (text)            => ({ type: 'paragraph', content: [{ type: 'text', text }] });
            const code    = (text)            => ({ type: 'codeBlock', attrs: { language: 'text' }, content: [{ type: 'text', text }] });
            const link    = (text, href)      => ({ type: 'paragraph', content: [{ type: 'text', text, marks: [{ type: 'link', attrs: { href } }] }] });
            const bullets = (items)           => ({ type: 'bulletList', content: items.map(t => ({ type: 'listItem', content: [{ type: 'paragraph', content: [{ type: 'text', text: t }] }] })) });

            const adfContent = [
              heading('Summary'),
              para(`A Copilot-generated fix PR was closed without merging. The proposed fix was insufficient or incorrect, so the underlying test failure remains. Manual investigation by a developer is required.`),

              heading('Context'),
              bullets([
                `Original GitHub issue: #${issueNumber} - ${issueTitle}`,
                `Rejected PR: #${prNumber} - ${prTitle}`,
                `Closed by: ${closedBy}`,
                `Repository: ${repo}`,
                `Detected at: ${new Date().toISOString()}`,
              ]),

              heading('Failed Scenarios'),
              failedLocations.length
                ? bullets(failedLocations)
                : (failures.length
                    ? bullets(failures.map(f => `${f.scenario} (${f.classname})`))
                    : para('No scenario list available — see GitHub issue for details.')),

              heading('Failure Details'),
              ...(failures.length
                ? failures.slice(0, 5).flatMap(f => [
                    heading(`❌ ${f.scenario}`, 3),
                    bullets([
                      `Class: ${f.classname}`,
                      `Error type: ${f.type}`,
                      `Message: ${f.message || '(no message)'}`,
                    ]),
                    code(f.stack.split('\n').slice(0, 20).join('\n')),
                  ])
                : [para('Detailed failure data not available — see linked GitHub Actions run.')]),

              heading('Steps to Reproduce'),
              bullets([
                'Clone the repository at the master branch.',
                'Run: mvn clean verify -Denv=qa -Dheadless.mode=true',
                'Observe failure in target/site/serenity/serenity-summary.html',
                'Inspect failsafe reports in target/failsafe-reports/ for stack traces',
              ]),

              heading('Investigation Hints'),
              bullets([
                'Review the rejected Copilot PR for context on what was attempted.',
                'Check if recent application/UI changes affected the failing scenario(s).',
                'Verify environment availability (test data, dependent services).',
                'Look for selector/locator drift in PageObjects.',
              ]),

              heading('Links'),
              link('Rejected Copilot PR', prUrl),
              link('Original GitHub Issue', `https://github.com/${repo}/issues/${issueNumber}`),
              ...(runUrl ? [link('Last Failed Test Run', runUrl)] : []),

              heading('Attachments'),
              para(screenshots.length
                ? `${screenshots.length} Serenity failure screenshot(s) attached.`
                : 'No screenshots captured for this run.'),
            ];

            const summary = `[Auto-Escalation] Copilot fix rejected - GitHub #${issueNumber} (PR #${prNumber})`;

            // ── Auto-detect issue type (JIRA project names vary) ──────────────
            const itResp = await fetch(`${jiraBase}/rest/api/3/project/${projectKey}`, {
              headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }
            });
            const itData = await itResp.json();
            const availableTypes = (itData.issueTypes || []).map(t => t.name);
            console.log(`Available issue types: ${availableTypes.join(', ')}`);
            const preferred = ['Bug', 'Defect', 'Task', 'Story', 'Improvement'];
            const issueTypeName = preferred.find(p => availableTypes.some(a => a.toLowerCase() === p.toLowerCase()))
              || availableTypes[0] || 'Task';
            console.log(`Using issue type: ${issueTypeName}`);

            const resp = await fetch(`${jiraBase}/rest/api/3/issue`, {
              method: 'POST',
              headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                fields: {
                  project: { key: projectKey },
                  summary,
                  description: { type: "doc", version: 1, content: adfContent },
                  issuetype: { name: issueTypeName },
                  labels: ["auto-test-failure", "self-healing-framework", "copilot-fix-rejected"],
                  priority: { name: "Highest" }
                }
              })
            });
            const data = await resp.json();
            if (!data.key) {
              console.log(`JIRA creation failed: ${JSON.stringify(data)}`);
              core.warning('Failed to create JIRA task. Check JIRA secrets and project config.');
              return;
            }
            console.log(`🐛 JIRA Bug created: ${data.key}`);
            console.log(`🔗 View in JIRA: ${jiraBase}/browse/${data.key}`);
            core.setOutput('jira_key', data.key);

            // ── Attach screenshots ─────────────────────────────────────────
            for (const shot of screenshots) {
              try {
                const buf = fs.readFileSync(shot);
                const formData = new FormData();
                formData.append('file', new Blob([buf]), path.basename(shot));
                const attachResp = await fetch(`${jiraBase}/rest/api/3/issue/${data.key}/attachments`, {
                  method: 'POST',
                  headers: { 'Authorization': `Basic ${auth}`, 'X-Atlassian-Token': 'no-check' },
                  body: formData
                });
                if (attachResp.ok) {
                  console.log(`📎 Attached ${path.basename(shot)} to ${data.key}`);
                } else {
                  console.log(`⚠️ Failed to attach ${path.basename(shot)}: ${attachResp.status}`);
                }
              } catch (e) {
                console.log(`⚠️ Error attaching ${shot}: ${e.message}`);
              }
            }

      - name: Label and Comment on GitHub Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const issueNumber = '${{ steps.extract.outputs.issue_number }}';
            const prNumber    = '${{ steps.extract.outputs.pr_number }}';
            const jiraKey     = '${{ steps.jira.outputs.jira_key }}';
            const jiraBase    = '${{ secrets.JIRA_BASE_URL }}';
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const jiraLine = jiraKey
              ? `🔗 JIRA defect created: [${jiraKey}](${jiraBase}/browse/${jiraKey})`
              : '⚠️ JIRA defect creation failed — check workflow logs.';

            // Always comment on the PR itself so the JIRA link is always visible
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: Number(prNumber),
              body: `⚠️ **This Copilot fix PR was closed without merging.**\n\nThe automated fix was insufficient. No verification rerun will be triggered. This failure has been escalated to JIRA for manual investigation.\n\n${jiraLine}`
            });
            console.log(`Commented on PR #${prNumber} with JIRA link.`);

            // Also comment on the linked GitHub issue if we have one
            if (issueNumber) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: Number(issueNumber),
                  labels: ['needs-manual-fix']
                });
              } catch (e) {
                console.log(`Could not add label: ${e.message}`);
              }

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: Number(issueNumber),
                body: `⚠️ **Copilot fix PR #${prNumber} was rejected** (closed without merging).\n\nThe automated fix was insufficient. No verification rerun will be triggered. This issue has been escalated to JIRA for manual investigation.\n\n${jiraLine}\n\nLabel \`needs-manual-fix\` has been added.`
              });
              console.log(`Commented on issue #${issueNumber} with JIRA link.`);
            } else {
              console.log('No linked issue number found — skipping issue comment.');
            }
